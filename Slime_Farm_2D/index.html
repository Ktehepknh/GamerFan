<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Farm 2D | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffcc00; --diam: #00f2ff; --bg: #0b0b0f;
            --panel: rgba(15, 15, 20, 0.98); --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: white; overflow: hidden; }
        #bg-img { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.2); z-index: 1; }
        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; }
        #hud { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .stat { background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; flex: 1; }
        .paddock { background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .paddock:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .paddock-label { position: absolute; top: 8px; left: 10px; font-size: 10px; color: var(--accent); font-weight: bold; z-index: 5; }
        .slime-img { position: absolute; width: 45px; height: 45px; pointer-events: none; z-index: 2; transition: 0.5s ease-in-out; }

        /* БОКОВАЯ ПАНЕЛЬ */
        #side { width: 380px; background: var(--panel); border-left: 3px solid var(--accent); display: flex; flex-direction: column; }
        .tabs { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        
        .list { flex: 1; overflow-y: auto; padding: 12px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .btn-buy { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-buy:disabled { opacity: 0.2; cursor: not-allowed; }

        .page-btn { padding: 8px 15px; background: #111; border: 1px solid var(--accent); color: white; cursor: pointer; border-radius: 5px; }
        .page-btn.active { background: var(--accent); color: black; }

        #save-status { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #444; z-index: 100; }
    </style>
</head>
<body>

<div id="bg-img"></div>
<div id="save-status">Синхронизация с Mark-42...</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat">🟡 <span id="c-val">0</span></div>
            <div class="stat">💎 <span id="d-val">0</span></div>
            <div style="margin-left:auto; color:var(--accent); font-weight:bold; font-size:14px;" id="p-name">ЗАГРУЗКА...</div>
        </div>

        <div id="grid"></div>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <button class="page-btn active" id="pbtn0" onclick="setPage(0)">1</button>
            <button class="page-btn" id="pbtn1" onclick="setPage(1)">2</button>
            <button class="page-btn" id="pbtn2" onclick="setPage(2)">3</button>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" onclick="showTab('s', this)">МАГАЗИН</div>
            <div class="tab" onclick="showTab('u', this)">ПРОКАЧКА</div>
            <div class="tab" onclick="showTab('w', this)">НАЙМ</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-w" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    // Конфигурация Firebase
    const conf = {
        apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
        authDomain: "gamesfan-17986.firebaseapp.com",
        projectId: "gamesfan-17986",
        databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
        appId: "1:311654524584:web:9283eea0aea6f7b946849d"
    };
    firebase.initializeApp(conf);
    const auth = firebase.auth(), db = firebase.database();

    // Данные игры (22 слайма)
    let game = {
        coins: 100, diams: 0, page: 0,
        inv: new Array(23).fill(0), // от 0 до 22
        clickPwr: 1, autoEnabled: false, workers: 0
    };

    // Цены (ФИКСИРОВАННЫЕ, как ты просил)
    const PRICES = [0, 50, 150, 400, 1000, 2500, 6000, 15000, 35000, 80000, 150000, 300000, 700000, 1500000, 3000000, 7000000, 15000000, 40000000, 100000000, 250000000, 600000000, 1500000000, 5000000000];

    let uID = null;

    auth.onAuthStateChanged(user => {
        if(user) {
            uID = user.uid;
            db.ref('users/' + uID).once('value', s => {
                if(s.exists()){
                    document.getElementById('p-name').innerText = (s.val().nick || "ИГРОК").toUpperCase();
                    if(s.val().farm_save) game = s.val().farm_save;
                }
                updateUI(); initGrid();
            });
        }
    });

    function save() {
        if(!uID) return;
        document.getElementById('save-status').innerText = "Сохранение...";
        db.ref('users/' + uID + '/farm_save').set(game).then(() => {
            document.getElementById('save-status').innerText = "Облако Mark-42: Синхронизировано";
        });
    }

    function initGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        let start = game.page * 8 + 1;
        
        for(let i=0; i<8; i++) {
            let id = start + i;
            if(id > 22) break; // Ограничение в 22 слайма

            let p = document.createElement('div');
            p.className = 'paddock';
            p.innerHTML = `<div class="paddock-label">ЗАГОН ${id} | x${game.inv[id]}</div>`;
            
            p.onclick = () => {
                if(game.inv[id] > 0) {
                    let gain = id * game.inv[id] * game.clickPwr;
                    game.coins += gain;
                    updateUI();
                }
            };

            // Спавн визуальных слаймов
            for(let n=0; n<Math.min(game.inv[id], 8); n++) {
                let img = document.createElement('img');
                img.className = 'slime-img';
                img.src = `assets/slime${id}.png`;
                img.style.left = Math.random()*70 + 5 + "%";
                img.style.top = Math.random()*60 + 10 + "%";
                img.onerror = () => img.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                p.appendChild(img);
            }
            grid.appendChild(p);
        }
    }

    function buySlime(id) {
        let price = PRICES[id];
        if(game.coins >= price && game.inv[id] < 16) {
            game.coins -= price;
            game.inv[id]++;
            save(); updateUI(); initGrid();
        }
    }

    function updateUI() {
        document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
        document.getElementById('d-val').innerText = game.diams;

        // Рендер магазина
        let shopHtml = "";
        for(let i=1; i<=22; i++) {
            shopHtml += `
            <div class="card">
                <b>Слайм #${i}</b> (В загоне: ${game.inv[i]}/16)<br>
                <small>Доход: ${i * game.clickPwr} за шт.</small>
                <button class="btn-buy" onclick="buySlime(${i})" ${game.coins < PRICES[i] || game.inv[i] >= 16 ? 'disabled' : ''}>
                    Купить: ${PRICES[i].toLocaleString()} 🟡
                </button>
            </div>`;
        }
        document.getElementById('list-s').innerHTML = shopHtml;

        // Прокачка
        document.getElementById('list-u').innerHTML = `
            <div class="card"><b>Сила клика (x${game.clickPwr})</b><button class="btn-buy" onclick="upg('p')">${(game.clickPwr*1000).toLocaleString()} 🟡</button></div>
            <div class="card"><b>Авто-сбор</b><button class="btn-buy" onclick="upg('a')" ${game.autoEnabled?'disabled':''}>10,000 🟡</button></div>
        `;

        // Найм
        document.getElementById('list-w').innerHTML = `
            <div class="card"><b>Рабочие (Ур. ${game.workers})</b><br><small>Ускоряют пассивный доход</small>
            <button class="btn-buy" onclick="upg('w')">${((game.workers+1)*5000).toLocaleString()} 🟡</button></div>
        `;
    }

    function upg(type) {
        if(type==='p' && game.coins >= game.clickPwr*1000) { game.coins -= game.clickPwr*1000; game.clickPwr++; }
        if(type==='a' && game.coins >= 10000) { game.coins -= 10000; game.autoEnabled = true; }
        if(type==='w' && game.coins >= (game.workers+1)*5000) { game.coins -= (game.workers+1)*5000; game.workers++; }
        save(); updateUI();
    }

    function setPage(p) {
        game.page = p;
        document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pbtn'+p).classList.add('active');
        initGrid();
    }

    function showTab(t, el) {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        ['s','u','w'].forEach(n => document.getElementById('list-'+n).style.display = (t===n?'block':'none'));
    }

    // Пассивный доход
    setInterval(() => {
        if(game.autoEnabled && game.workers > 0) {
            let income = 0;
            game.inv.forEach((count, id) => income += (id * count));
            game.coins += (income * game.workers * 0.1);
            updateUI();
        }
    }, 1000);

    // Авто-сейв каждые 30 сек
    setInterval(save, 30000);

</script>
</body>
</html>
