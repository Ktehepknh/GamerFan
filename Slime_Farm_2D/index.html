<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Clicker 2D | Mark-42 Studio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ffcc00; --diam: #00f2ff; --panel: rgba(20, 20, 25, 0.98); --border: rgba(255, 255, 255, 0.1); --bg-color: #000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; outline: none; }
        body { margin: 0; background: var(--bg-color); color: white; overflow: hidden; height: 100vh; }
        #bg { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.2); z-index: 1; }
        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; flex: 1; }
        .paddock { background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 20px; position: relative; cursor: pointer; overflow: hidden; transition: 0.2s; }
        .paddock:hover { border-color: var(--accent); }
        .slime-img { position: absolute; width: 42px; height: 42px; will-change: transform; transition: transform 2.5s ease-in-out; pointer-events: none; }
        #hud { display: flex; gap: 15px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; border: 1px solid var(--border); align-items: center; margin-bottom: 10px; backdrop-filter: blur(10px); }
        .stat { font-size: 18px; font-weight: bold; display: flex; align-items: center; }
        .res-icon { width: 18px; height: 18px; margin-right: 5px; }
        #side { width: 380px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; background: rgba(0,0,0,0.3); }
        .tab { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 10px; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .list { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 6px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-diam { background: var(--diam); }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #15151a; border: 1px solid var(--accent); padding: 25px; border-radius: 20px; width: 300px; }
    </style>
</head>
<body>

<audio id="s-click" src="assets/click.mp3"></audio>
<audio id="s-buy" src="assets/buy.mp3"></audio>
<audio id="s-music" loop src="assets/music.mp3"></audio>
<div id="bg"></div>

<div id="m-sets" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--accent); text-align: center; margin-top:0;">НАСТРОЙКИ</h3>
        <button class="btn" style="width:100%; background:#ff4444; color:#fff;" onclick="fullReset()">СБРОС ПРОГРЕССА</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="toggleModal(false)">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png" class="res-icon"><span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png" class="res-icon"><span id="d-val">0</span></div>
            <div style="margin-left:auto; font-size:12px; color:var(--accent);">Mult: x<span id="m-val">1.0</span></div>
            <button class="btn" onclick="toggleModal(true)">⚙️</button>
        </div>
        
        <div id="grid"></div>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <button class="btn" id="mega-btn" style="display:none; background:var(--diam); animation: pulse 2s infinite;" onclick="megaClick()">⚡ КЛИК ПО ВСЕМ ⚡</button>
            <button class="btn" onclick="setPage(0)">1</button>
            <button class="btn" onclick="setPage(1)">2</button>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" id="t-s" onclick="openTab('s')">СЛАЙМЫ</div>
            <div class="tab" id="t-u" onclick="openTab('u')">UPGRADE</div>
            <div class="tab" id="t-q" onclick="openTab('q')">КВЕСТЫ</div>
            <div class="tab" id="t-b" onclick="openTab('b')">VIP</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
        <div id="list-b" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    const config = { apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI", authDomain: "gamesfan-17986.firebaseapp.com", databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/", projectId: "gamesfan-17986" };
    firebase.initializeApp(config);
    const db = firebase.database();

    const RANKS = [{n:"Медный", c:"#cd7f32", m:1}, {n:"Железный", c:"#aaa", m:2}, {n:"Золотой", c:"#ffcc00", m:5}, {n:"Алмазный", c:"#00f2ff", m:10}];
    const PRICES = [0, 30, 150, 500, 1200, 3000, 8000, 20000, 50000, 120000, 300000, 800000, 2000000, 5000000, 15000000, 40000000, 100000000, 300000000];

    let game = {
        coins: 100, diams: 10, page: 0, 
        inv: new Array(25).fill(0), 
        rank: 0, upg: 0, clicks: 0,
        hasMega: false,
        settings: { music: true, sfx: true },
        quests: [
            {t:"Сборщик", trg:100, cur:0, r:15, d:false, rk:0},
            {t:"Клик-Мастер", trg:500, cur:0, r:30, d:false, rk:0},
            {t:"Магнат", trg:5000, cur:0, r:100, d:false, rk:1}
        ]
    };

    function f(n) {
        if (n < 1000) return Math.floor(n);
        let s = ["", "k", "M", "B", "T"];
        let e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(1) + s[e];
    }

    function getMult() {
        return (1 + (game.rank * 2) + (game.upg * RANKS[game.rank].m));
    }

    function getLimit() { return game.upg >= 4 ? 12 : 8; }

    function render() {
        document.getElementById('c-val').innerText = f(game.coins);
        document.getElementById('d-val').innerText = game.diams;
        document.getElementById('m-val').innerText = getMult().toFixed(1);
        document.getElementById('mega-btn').style.display = game.hasMega ? 'block' : 'none';
        renderGrid(); renderShop(); renderUpg(); renderQuests(); renderVIP();
    }

    function renderGrid() {
        const g = document.getElementById('grid'); g.innerHTML = "";
        let lim = getLimit();
        let start = game.page * 8 + 1;
        for(let i=0; i<8; i++){
            let id = start+i; if(id>24) break;
            let p = document.createElement('div'); p.className = 'paddock';
            p.innerHTML = `<div style="position:absolute;top:5px;left:8px;font-size:9px;color:#777;">№${id} [${game.inv[id]}/${lim}]</div>`;
            p.onclick = () => doClick(id);
            for(let n=0; n<game.inv[id]; n++){
                let s = document.createElement('img'); s.className = 'slime-img'; 
                s.src = `assets/slime${id}.png`;
                s.style.left = Math.random()*60+10+"%"; s.style.top = Math.random()*50+15+"%";
                s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                p.appendChild(s);
            }
            g.appendChild(p);
        }
    }

    function doClick(id) {
        if(game.inv[id]>0){ 
            game.coins += (id * game.inv[id] * getMult()); 
            game.clicks++; checkQ(); play('click'); render(); 
        }
    }

    function megaClick() {
        for(let i=1; i<game.inv.length; i++) if(game.inv[i]>0) doClick(i);
    }

    function renderShop() {
        let h = "";
        for(let i=1; i<=18; i++){
            let isFull = game.inv[i] >= getLimit();
            let dPrice = Math.ceil(PRICES[i] / 500) + 1;
            h += `<div class="card"><img src="assets/slime${i}.png" style="width:35px" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'">
            <div style="flex:1"><b>Слайм #${i}</b><br><small>${game.inv[i]}/${getLimit()}</small></div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <button class="btn" onclick="buyS(${i},'c')" ${ (game.coins<PRICES[i] || isFull)?'disabled':''}>${f(PRICES[i])} 🪙</button>
                <button class="btn btn-diam" onclick="buyS(${i},'d')" ${ (game.diams<dPrice || isFull)?'disabled':''}>${dPrice} 💎</button>
            </div></div>`;
        }
        document.getElementById('list-s').innerHTML = h;
    }

    function renderUpg() {
        let r = RANKS[game.rank];
        let cost = (game.upg + 1) * 2000 * (game.rank + 1);
        let dCost = (game.upg + 1) * 10;
        let h = `<div style="text-align:center; padding:10px; color:${r.c}; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:10px;">
            <b>${r.n} Ранг</b> (Прокачка: ${game.upg}/4)</div>`;
        
        if(game.upg < 4) {
            h += `<div class="card"><div style="flex:1"><b>Сила клика</b><br><small>+${r.m} к множителю</small></div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <button class="btn" onclick="buyU(${cost},'c')" ${game.coins<cost?'disabled':''}>${f(cost)} 🪙</button>
                <button class="btn btn-diam" onclick="buyU(${dCost},'d')" ${game.diams<dCost?'disabled':''}>${dCost} 💎</button>
            </div></div>`;
        } else if(game.rank < 3) {
            let nc = (game.rank + 1) * 50000;
            h += `<button class="btn" style="width:100%; height:40px;" onclick="nextR(${nc})" ${game.coins<nc?'disabled':''}>НОВЫЙ РАНГ (${f(nc)} 🪙)</button>`;
        }
        document.getElementById('list-u').innerHTML = h;
    }

    function renderQuests() {
        let h = "";
        game.quests.filter(q => q.rk <= game.rank).forEach(q => {
            let p = Math.min(100, (q.cur/q.trg)*100);
            h += `<div class="card" style="opacity:${q.d?0.5:1}"><div style="flex:1"><b>${q.t}</b><br><small>${q.cur}/${q.trg}</small>
            <div style="width:100%;height:4px;background:#000;margin-top:5px;border-radius:2px;overflow:hidden"><div style="width:${p}%;height:100%;background:var(--accent)"></div></div></div>
            <div style="color:var(--diam); font-weight:bold;">+${q.r} 💎</div></div>`;
        });
        document.getElementById('list-q').innerHTML = h;
    }

    function renderVIP() {
        let h = `<div class="card"><div style="flex:1"><b>MEGA CLICKER</b><br><small>Кликает на все загоны разом!</small></div>
        <button class="btn btn-diam" onclick="buyMega()" ${game.hasMega?'disabled':''}>${game.hasMega ? 'КУПЛЕНО' : '150 💎'}</button></div>`;
        document.getElementById('list-b').innerHTML = h;
    }

    function buyS(id, t){ 
        let price = t=='c'?PRICES[id]:Math.ceil(PRICES[id]/500)+1;
        if(t=='c' && game.coins>=price){ game.coins-=price; game.inv[id]++; }
        else if(t=='d' && game.diams>=price){ game.diams-=price; game.inv[id]++; }
        else return;
        play('buy'); save(); render();
    }

    function buyU(c, t){
        if(t=='c' && game.coins>=c){ game.coins-=c; game.upg++; }
        else if(t=='d' && game.diams>=c){ game.diams-=c; game.upg++; }
        else return;
        play('buy'); save(); render();
    }

    function buyMega() { if(game.diams>=150){ game.diams-=150; game.hasMega=true; play('buy'); save(); render(); } }
    function nextR(c){ if(game.coins>=c){ game.coins-=c; game.rank++; game.upg=0; play('buy'); save(); render(); } }
    function checkQ(){ game.quests.forEach(q=>{ if(q.rk <= game.rank){ q.cur = game.clicks; if(!q.d && q.cur>=q.trg){ q.d=true; game.diams+=q.r; } } }); }
    function setPage(p){ game.page=p; renderGrid(); }
    function play(id){ if(!game.settings.sfx) return; let a=document.getElementById('s-'+id); if(a){ a.currentTime=0; a.play().catch(()=>{}); } }
    function toggleModal(s){ document.getElementById('m-sets').style.display=s?'flex':'none'; }
    function openTab(t){ ['s','u','q','b'].forEach(x=>{document.getElementById('list-'+x).style.display='none'; document.getElementById('t-'+x).classList.remove('active');}); document.getElementById('list-'+t).style.display='block'; document.getElementById('t-'+t).classList.add('active'); }
    function save() { localStorage.setItem('slime_m42_v5', JSON.stringify(game)); }
    function load() {
        let s = localStorage.getItem('slime_m42_v5');
        if(s) { let ld = JSON.parse(s); game = {...game, ...ld}; }
        render(); if(game.settings.music) document.getElementById('s-music').play().catch(()=>{});
    }
    function fullReset(){ if(confirm("Сбросить всё? (Бонус: 500 🪙, 10 💎)")){ localStorage.clear(); location.reload(); } }

    setInterval(() => {
        document.querySelectorAll('.slime-img').forEach(s => {
            let x = (Math.random() * 30 - 15); let y = (Math.random() * 30 - 15);
            s.style.transform = `translate(${x}px, ${y}px) scaleX(${x > 0 ? 1 : -1})`;
        });
    }, 2500);

    window.onload = load;
</script>
</body>
</html>
