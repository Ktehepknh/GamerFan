<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Farm 2D | Mark-42 Studio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ffcc00; --panel: #111; --border: #333; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        #app { display: flex; height: 100vh; }
        #main { flex: 1; padding: 15px; display: flex; flex-direction: column; }
        #hud { display: flex; gap: 10px; margin-bottom: 10px; }
        .stat { background: var(--panel); padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-weight: bold; color: var(--accent); }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; flex: 1; }
        .paddock { background: #0a0a0a; border: 2px solid var(--border); border-radius: 15px; position: relative; cursor: pointer; overflow: hidden; }
        .paddock:active { border-color: var(--accent); transform: scale(0.98); }
        .paddock-label { position: absolute; top: 5px; left: 8px; font-size: 10px; color: #555; }
        .slime-img { position: absolute; width: 40px; pointer-events: none; }
        #side { width: 320px; background: var(--panel); border-left: 2px solid var(--accent); display: flex; flex-direction: column; }
        .tabs { display: flex; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .list { flex: 1; overflow-y: auto; padding: 10px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.3; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #111; padding: 25px; border-radius: 20px; border: 2px solid var(--accent); width: 280px; text-align: center; }
    </style>
</head>
<body>

<div id="m-sets" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--accent)">MARK-42 STUDIO</h3>
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="resetGame()">СБРОС ПРОГРЕССА</button>
        <button class="btn" style="width:100%; background:#444; color:#fff;" onclick="toggleModal(false)">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat">🟡 <span id="c-val">0</span></div>
            <div class="stat">💎 <span id="d-val">0</span></div>
            <button class="btn" style="margin-left:auto" onclick="toggleModal(true)">⚙️</button>
        </div>
        <div id="grid"></div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:10px;">
            <button class="btn" onclick="setPage(0)">1</button>
            <button class="btn" onclick="setPage(1)">2</button>
            <button class="btn" onclick="setPage(2)">3</button>
        </div>
    </div>
    <aside id="side">
        <div class="tabs">
            <div class="tab active">МАГАЗИН (24)</div>
        </div>
        <div id="list-s" class="list"></div>
    </aside>
</div>

<script>
    // Настройки Firebase
    const fCfg = {
        apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
        authDomain: "gamesfan-17986.firebaseapp.com",
        projectId: "gamesfan-17986",
        databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
        appId: "1:311654524584:web:9283eea0aea6f7b946849d"
    };
    firebase.initializeApp(fCfg);
    const db = firebase.database();
    let uID = null;

    // Цены (Фикс)
    const PRICES = [0, 50, 200, 600, 1500, 4000, 10000, 25000, 60000, 140000, 300000, 700000, 1500000, 3500000, 8000000, 20000000, 50000000, 120000000, 300000000, 750000000, 1500000000, 4000000000, 10000000000, 25000000000, 60000000000];

    let game = { coins: 100, diams: 0, page: 0, inv: new Array(25).fill(0) };

    // 1. Быстрое сохранение (Локалка + Облако)
    function save() {
        localStorage.setItem('sf2d_save', JSON.stringify(game));
        if (uID) db.ref('users/' + uID + '/farm').set(game);
    }

    // 2. Мгновенная загрузка
    function load() {
        const local = localStorage.getItem('sf2d_save');
        if (local) {
            game = JSON.parse(local);
            renderAll();
        }
        
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                uID = user.uid;
                db.ref('users/' + uID + '/farm').once('value', s => {
                    if (s.exists()) {
                        game = s.val();
                        renderAll();
                    }
                });
            }
        });
    }

    // 3. Сброс прогресса
    function resetGame() {
        if (confirm("Удалить всё?")) {
            game = { coins: 100, diams: 0, page: 0, inv: new Array(25).fill(0) };
            save();
            location.reload();
        }
    }

    function renderAll() {
        document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
        document.getElementById('d-val').innerText = game.diams;
        renderGrid();
        renderShop();
    }

    function renderGrid() {
        const g = document.getElementById('grid'); g.innerHTML = "";
        let start = game.page * 8 + 1;
        for (let i = 0; i < 8; i++) {
            let id = start + i; if (id > 24) break;
            let p = document.createElement('div');
            p.className = 'paddock';
            p.innerHTML = `<div class="paddock-label">ЗАГОН ${id} [${game.inv[id]}]</div>`;
            p.onclick = () => {
                if (game.inv[id] > 0) {
                    game.coins += (id * game.inv[id]);
                    document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
                }
            };
            for (let n = 0; n < Math.min(game.inv[id], 5); n++) {
                let s = document.createElement('img');
                s.className = 'slime-img'; s.src = `assets/slime${id}.png`;
                s.style.left = Math.random() * 70 + "%"; s.style.top = Math.random() * 60 + "%";
                s.onerror = () => s.src = "https://cdn-icons-png.flaticon.com/512/825/825561.png";
                p.appendChild(s);
            }
            g.appendChild(p);
        }
    }

    function renderShop() {
        let h = "";
        for (let i = 1; i <= 24; i++) {
            h += `<div class="card">
                <span><b>Слайм ${i}</b><br><small>${PRICES[i].toLocaleString()} 🟡</small></span>
                <button class="btn" onclick="buy(${i})" ${game.coins < PRICES[i] ? 'disabled' : ''}>КУПИТЬ</button>
            </div>`;
        }
        document.getElementById('list-s').innerHTML = h;
    }

    function buy(id) {
        if (game.coins >= PRICES[id] && game.inv[id] < 16) {
            game.coins -= PRICES[id];
            game.inv[id]++;
            save(); renderAll();
        }
    }

    function setPage(p) { game.page = p; renderGrid(); }
    function toggleModal(s) { document.getElementById('m-sets').style.display = s ? 'flex' : 'none'; }

    // Авто-сохранение раз в минуту
    setInterval(save, 60000);
    
    window.onload = load;
</script>
</body>
</html>
