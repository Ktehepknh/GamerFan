<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Farm 2D | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffcc00; --diam: #00f2ff; --bg: #0b0b0f;
            --panel: rgba(15, 15, 20, 0.98); --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: white; overflow: hidden; }
        #bg-img { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.2); z-index: 1; }
        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        #app.mobile-mode { flex-direction: column; }
        #app.mobile-mode #side { width: 100%; height: 45%; border-left: none; border-top: 3px solid var(--accent); }
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; }
        #hud { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .stat { background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        .stat img { width: 22px; height: 22px; }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; flex: 1; }
        .paddock { background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .paddock:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .paddock-label { position: absolute; top: 8px; left: 10px; font-size: 10px; color: var(--accent); font-weight: bold; z-index: 5; }
        .slime-img { position: absolute; width: 40px; height: 40px; pointer-events: none; z-index: 2; }
        #side { width: 380px; background: var(--panel); border-left: 3px solid var(--accent); display: flex; flex-direction: column; }
        .tabs { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .list { flex: 1; overflow-y: auto; padding: 12px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .btn-buy { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
        .btn-buy:disabled { opacity: 0.2; }
        #victor-ui { position: absolute; bottom: 85px; left: 20px; width: 350px; background: var(--panel); border: 2px solid var(--accent); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; z-index: 100; cursor: pointer; }
        .vic-face { width: 60px; height: 60px; background: url('assets/viktor.png') center/cover; border: 1px solid var(--accent); border-radius: 10px; flex-shrink: 0; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #15151f; border: 2px solid var(--accent); padding: 25px; border-radius: 20px; width: 320px; text-align: center; }
    </style>
</head>
<body>

<div id="bg-img"></div>

<div id="m-settings" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--accent); margin:0 0 20px 0;">УПРАВЛЕНИЕ</h3>
        <button class="btn-buy" onclick="toggleMode()" id="mode-btn">РЕЖИМ: PC</button>
        <button class="btn-buy" onclick="toggleVic()" id="vic-btn">ВИКТОР: ВКЛ</button>
        <input type="password" id="adm-in" placeholder="Код взлома" style="width:100%; padding:10px; margin-top:10px; background:#000; color:white; border:1px solid #333;">
        <button class="btn-buy" onclick="runAdmin()">ВЗЛОМАТЬ</button>
        <button class="btn-buy" style="background:#ff4444; margin-top:20px;" onclick="closeSettings()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png"> <span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png"> <span id="d-val">0</span></div>
            <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
                <span id="player-nick" style="color:var(--accent); font-weight:bold;">MARK-42 PLAYER</span>
                <span onclick="openSettings()" style="cursor:pointer; font-size:24px;">⚙️</span>
            </div>
        </div>
        
        <div id="grid"></div>
        
        <div style="display:flex; justify:center; gap:20px; margin-top:15px;">
            <div id="pbtn0" class="tab active" style="flex:none; width:40px;" onclick="setPage(0)">1</div>
            <div id="pbtn1" class="tab" style="flex:none; width:40px;" onclick="setPage(1)">2</div>
            <div id="pbtn2" class="tab" style="flex:none; width:40px;" onclick="setPage(2)">3</div>
        </div>

        <div id="victor-ui" onclick="vicTalk()">
            <div class="vic-face"></div>
            <div><b style="color:var(--accent)">Виктор:</b><div id="vic-msg" style="font-size:13px;">Данные синхронизированы с базой Mark-42!</div></div>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" onclick="setTab('s', this)">МАГАЗИН</div>
            <div class="tab" onclick="setTab('u', this)">ПРОКАЧКА</div>
            <div class="tab" onclick="setTab('q', this)">КВЕСТЫ</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    // FIREBASE
    const cfg = {
        apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
        authDomain: "gamesfan-17986.firebaseapp.com",
        projectId: "gamesfan-17986",
        databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
        appId: "1:311654524584:web:9283eea0aea6f7b946849d"
    };
    firebase.initializeApp(cfg);
    const auth = firebase.auth(), db = firebase.database();

    // GAME DATA (24 SLIMES)
    let game = {
        coins: 100, diams: 10, page: 0,
        inv: new Array(25).fill(0), // Теперь до 24
        upg: { pwr: 1, auto: false },
        mode: 'PC', vic: true,
        quests: [
            {t: "Начинающий", target: 100, cur: 0, rew: 5, done: false},
            {t: "Магнат", target: 10000, cur: 0, rew: 50, done: false}
        ]
    };

    // ФИКСИРОВАННЫЕ ЦЕНЫ (Массив для всех 24)
    const PRICES = [0, 50, 200, 500, 1200, 3000, 7500, 18000, 45000, 100000, 250000, 600000, 1500000, 4000000, 10000000, 25000000, 60000000, 150000000, 400000000, 1000000000, 2500000000, 6000000000, 15000000000, 40000000000, 100000000000];

    let userUID = null;

    auth.onAuthStateChanged(user => {
        if(user) {
            userUID = user.uid;
            db.ref('users/' + userUID).on('value', s => {
                if(s.val()?.farm_save) game = s.val().farm_save;
                document.getElementById('player-nick').innerText = s.val()?.nick?.toUpperCase() || "PLAYER";
                update(); initGrid();
            });
        }
    });

    function save() {
        if(userUID) db.ref('users/' + userUID + '/farm_save').set(game);
    }

    function initGrid() {
        const g = document.getElementById('grid'); g.innerHTML = "";
        let start = game.page * 8 + 1;
        for(let i=0; i<8; i++) {
            let id = start + i; if(id > 24) break;
            let p = document.createElement('div');
            p.className = 'paddock';
            p.innerHTML = `<div class="paddock-label">ЗАГОН ${id} [${game.inv[id]}/16]</div>`;
            p.onclick = () => { 
                if(game.inv[id] > 0) { 
                    game.coins += (id * game.inv[id] * game.upg.pwr); 
                    game.quests.forEach(q => { if(!q.done) q.cur += 1; if(q.cur>=q.target) { q.done=true; game.diams+=q.rew; } });
                    update(); 
                } 
            };
            g.appendChild(p);
            for(let n=0; n<Math.min(game.inv[id], 6); n++) {
                let s = document.createElement('img');
                s.className = 'slime-img'; s.src = `assets/slime${id}.png`;
                s.style.left = Math.random()*70+"%"; s.style.top = Math.random()*60+"%";
                s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                p.appendChild(s);
            }
        }
    }

    function buyS(id) {
        if(game.coins >= PRICES[id] && game.inv[id] < 16) {
            game.coins -= PRICES[id]; game.inv[id]++;
            save(); update(); initGrid();
        }
    }

    function update() {
        document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
        document.getElementById('d-val').innerText = game.diams;
        
        let sH = "";
        for(let i=1; i<=24; i++) {
            sH += `<div class="card"><b>Слайм #${i}</b><br><small>Цена: ${PRICES[i].toLocaleString()} 🟡</small>
            <button class="btn-buy" onclick="buyS(${i})" ${game.coins<PRICES[i]?'disabled':''}>КУПИТЬ</button></div>`;
        }
        document.getElementById('list-s').innerHTML = sH;

        document.getElementById('list-u').innerHTML = `
            <div class="card"><b>Сила клика (x${game.upg.pwr})</b><button class="btn-buy" onclick="game.coins>=1000?(game.coins-=1000,game.upg.pwr++,save(),update()):null">УЛУЧШИТЬ (1,000)</button></div>
            <div class="card"><b>Авто-сбор</b><button class="btn-buy" onclick="game.coins>=5000?(game.coins-=5000,game.upg.auto=true,save(),update()):null" ${game.upg.auto?'disabled':''}>КУПИТЬ (5,000)</button></div>
        `;

        let qH = "";
        game.quests.forEach(q => qH += `<div class="card" style="opacity:${q.done?0.5:1}"><b>${q.t}</b><br>${q.cur}/${q.target}</div>`);
        document.getElementById('list-q').innerHTML = qH;
    }

    // ТВОИ ФУНКЦИИ ИЗ ФАЙЛА
    function openSettings() { document.getElementById('m-settings').style.display='flex'; }
    function closeSettings() { document.getElementById('m-settings').style.display='none'; }
    function toggleMode() { 
        game.mode = game.mode==='PC'?'MOBILE':'PC'; 
        document.getElementById('app').className = game.mode==='MOBILE'?'mobile-mode':''; 
        document.getElementById('mode-btn').innerText = 'РЕЖИМ: '+game.mode; 
    }
    function toggleVic() { 
        game.vic = !game.vic; 
        document.getElementById('victor-ui').style.display = game.vic?'flex':'none'; 
        document.getElementById('vic-btn').innerText='ВИКТОР: '+(game.vic?'ВКЛ':'ВЫКЛ'); 
    }
    function runAdmin() { 
        if(document.getElementById('adm-in').value==='2014') { 
            game.coins+=1000000; game.diams+=1000; update(); alert('MARK-42: Система взломана!'); 
        } 
    }
    function setPage(p) {
        game.page = p;
        for(let i=0; i<3; i++) document.getElementById('pbtn'+i).classList.remove('active');
        document.getElementById('pbtn'+p).classList.add('active');
        initGrid();
    }
    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        el.classList.add('active');
        ['s','u','q'].forEach(n => document.getElementById('list-'+n).style.display = t===n?'block':'none');
    }

    // ПАССИВ (Авто-сбор)
    setInterval(() => {
        if(game.upg.auto) {
            let inc = 0; game.inv.forEach((n, id) => inc += (n * id * 0.1));
            game.coins += inc; update();
        }
    }, 1000);

    // Авто-сейв
    setInterval(save, 30000);
</script>
</body>
</html>
