<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Clicker 2D | Mark-42 Studio</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --accent: #ffcc00; 
            --diam: #00f2ff; 
            --panel: rgba(20, 20, 25, 0.98); 
            --border: rgba(255, 255, 255, 0.1);
            --bg-color: #000;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; outline: none; }
        body { margin: 0; background: var(--bg-color); color: white; overflow: hidden; height: 100vh; transition: background 0.5s; }
        #bg { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.2); z-index: 1; }
        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        
        /* Стили загонов и физики */
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 10px; flex: 1; }
        .paddock { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid var(--border); 
            border-radius: 20px; 
            position: relative; 
            cursor: pointer; 
            overflow: hidden; 
            transition: transform 0.1s, border-color 0.3s;
        }
        .paddock:active { transform: scale(0.98); }
        .paddock:hover { border-color: var(--accent); }
        
        .slime-img { 
            position: absolute; 
            width: 45px; height: 45px; 
            transition: left 3s linear, top 3s linear, transform 0.2s; 
            z-index: 2;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        /* HUD и интерфейс */
        #hud { display: flex; gap: 15px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; border: 1px solid var(--border); align-items: center; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .stat { font-size: 18px; font-weight: bold; display: flex; align-items: center; }
        .res-icon { width: 18px; height: 18px; margin-right: 5px; }

        #side { width: 380px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(20px); }
        .tabs { display: flex; background: rgba(0,0,0,0.3); }
        .tab { flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #666; transition: 0.3s; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .list { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 15px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        /* Настройки */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-box { background: #1a1a20; border: 2px solid var(--accent); padding: 25px; border-radius: 25px; width: 350px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<audio id="s-click" src="assets/click.mp3"></audio>
<audio id="s-buy" src="assets/buy.mp3"></audio>
<audio id="s-music" loop src="assets/music.mp3"></audio>
<div id="bg"></div>

<div id="m-sets" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--accent); margin-top:0; text-align: center;">МЕНЮ НАСТРОЕК</h3>
        
        <div class="setting-row"><span>Музыка</span><input type="checkbox" id="set-music" onchange="updateSets()" checked></div>
        <div class="setting-row"><span>Звуки</span><input type="checkbox" id="set-sfx" onchange="updateSets()" checked></div>
        <div class="setting-row"><span>HD Слаймы</span><input type="checkbox" id="set-hd" onchange="updateSets()" checked></div>
        <div class="setting-row"><span>Темная тема</span><input type="checkbox" id="set-theme" onchange="updateSets()" checked></div>
        
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="exportSave()">ЭКСПОРТ СОХРАНЕНИЯ</button>
        <button class="btn" style="width:100%; margin-bottom:20px; background:#ff4444; color:#fff;" onclick="fullReset()">СБРОС ПРОГРЕССА</button>
        <button class="btn" style="width:100%; background:#333; color:#fff;" onclick="toggleModal(false)">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png" class="res-icon"><span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png" class="res-icon"><span id="d-val">0</span></div>
            <div style="margin-left:auto; font-size:12px; color:var(--accent); font-weight:bold;">Multiplier: x<span id="m-val">1.0</span></div>
            <button class="btn" style="background:none; color:#fff; font-size:20px;" onclick="toggleModal(true)">⚙️</button>
        </div>
        
        <div id="grid"></div>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button class="btn" onclick="setPage(0)">стр. 1</button>
            <button class="btn" onclick="setPage(1)">стр. 2</button>
            <button class="btn" onclick="setPage(2)">стр. 3</button>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" id="t-s" onclick="openTab('s')">МАГАЗИН</div>
            <div class="tab" id="t-u" onclick="openTab('u')">УЛУЧШЕНИЯ</div>
            <div class="tab" id="t-q" onclick="openTab('q')">КВЕСТЫ</div>
            <div class="tab" id="t-b" onclick="openTab('b')">БУСТЫ</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
        <div id="list-b" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    const config = { apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI", authDomain: "gamesfan-17986.firebaseapp.com", databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/", projectId: "gamesfan-17986" };
    firebase.initializeApp(config);
    const db = firebase.database();
    let uID = null;

    const PRICES = [0, 50, 250, 700, 2000, 5000, 15000, 40000, 100000, 250000, 600000, 1500000, 4000000, 10000000, 25000000, 60000000, 150000000, 400000000, 1000000000, 2500000000, 6000000000, 15000000000, 40000000000, 100000000000, 250000000000];
    const RANKS = [{n:"Медный", c:"#cd7f32"}, {n:"Железный", c:"#aaa"}, {n:"Золотой", c:"#ffcc00"}, {n:"Алмазный", c:"#00f2ff"}];

    let game = {
        coins: 100, diams: 0, page: 0, 
        inv: new Array(25).fill(0), 
        rank: 0, upg: 0, 
        clicks: 0, boost: 1, boostEnd: 0,
        settings: { music: true, sfx: true, hd: true, theme: true },
        quests: [{t:"Новичок", trg:100, cur:0, r:10, d:false}, {t:"Кликатель", trg:1000, cur:0, r:50, d:false}]
    };

    // Форматирование чисел
    function fNum(n) {
        if (n < 1000) return Math.floor(n);
        let s = ["", "k", "M", "B", "T"];
        let e = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, e)).toFixed(2) + s[e];
    }

    function getMult() {
        let species = game.inv.filter(x => x > 0).length;
        return (1 + (species * 0.5)) * (1 + (game.rank * 2) + (game.upg * 0.2)) * game.boost;
    }

    function render() {
        document.getElementById('c-val').innerText = fNum(game.coins);
        document.getElementById('d-val').innerText = game.diams;
        document.getElementById('m-val').innerText = getMult().toFixed(1);
        renderGrid(); renderShop(); renderUpg(); renderQuests(); renderBoosts();
    }

    function renderGrid() {
        const g = document.getElementById('grid'); g.innerHTML = "";
        let start = game.page * 8 + 1;
        for(let i=0; i<8; i++){
            let id = start+i; if(id>24) break;
            let p = document.createElement('div'); p.className = 'paddock';
            p.innerHTML = `<div style="position:absolute;top:5px;left:10px;font-size:10px;color:#888;z-index:5;">№${id} [${game.inv[id]}]</div>`;
            p.onclick = (e) => { 
                if(game.inv[id]>0){ 
                    game.coins += (id * game.inv[id] * getMult()); 
                    game.clicks++; 
                    checkQ(); play('click'); 
                    render();
                } 
            };
            
            // Физика: Слаймы
            for(let n=0; n<Math.min(game.inv[id], 5); n++){
                let s = document.createElement('img'); 
                s.className = 'slime-img'; 
                s.src = `assets/slime${id}.png`;
                s.style.left = Math.random()*70+5+"%"; 
                s.style.top = Math.random()*60+10+"%";
                if(!game.settings.hd) s.style.filter = "none";
                s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                p.appendChild(s);
            }
            g.appendChild(p);
        }
    }

    // Логика "физики" хождения
    setInterval(() => {
        document.querySelectorAll('.slime-img').forEach(s => {
            s.style.left = Math.max(5, Math.min(85, parseFloat(s.style.left) + (Math.random()*20-10))) + "%";
            s.style.top = Math.max(10, Math.min(75, parseFloat(s.style.top) + (Math.random()*20-10))) + "%";
            s.style.transform = `scaleX(${Math.random() > 0.5 ? 1 : -1})`;
        });
    }, 3000);

    function renderShop() {
        let h = "";
        for(let i=1; i<=24; i++){
            h += `<div class="card"><img src="assets/slime${i}.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'" style="width:40px">
            <div style="flex:1"><b>Слайм #${i}</b><br><small>Цена: ${fNum(PRICES[i])}</small></div>
            <button class="btn" onclick="buyS(${i})" ${game.coins<PRICES[i]?'disabled':''}>КУПИТЬ</button></div>`;
        }
        document.getElementById('list-s').innerHTML = h;
    }

    function renderUpg() {
        let r = RANKS[game.rank];
        let cost = (game.upg + 1) * 5000 * (game.rank + 1);
        let h = `<div style="text-align:center; padding:10px; color:${r.c}; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:10px;">
            <b>${r.n} Ранг</b><br><small>Прогресс: ${game.upg}/8</small></div>`;
        
        if(game.upg < 8) {
            h += `<div class="card"><div style="flex:1"><b>Улучшение ${game.upg+1}</b><br><small>Доход +20%</small></div>
            <button class="btn" onclick="buyU(${cost})" ${game.coins<cost?'disabled':''}>${fNum(cost)}</button></div>`;
        } else if(game.rank < 3) {
            let nextCost = (game.rank + 1) * 100000;
            h += `<button class="btn" style="width:100%; padding:15px;" onclick="nextR(${nextCost})" ${game.coins<nextCost?'disabled':''}>ПОВЫСИТЬ РАНГ (${fNum(nextCost)})</button>`;
        }
        document.getElementById('list-u').innerHTML = h;
    }

    function renderQuests() {
        let h = "";
        game.quests.forEach(q => {
            let p = Math.min(100, (q.cur/q.trg)*100);
            h += `<div class="card" style="opacity:${q.d?0.5:1}"><div style="flex:1"><b>${q.t}</b><br><small>${q.cur}/${q.trg}</small>
            <div style="width:100%;height:6px;background:#000;margin-top:5px;border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:var(--accent)"></div></div></div>
            <div style="color:var(--diam); font-weight:bold;">+${q.r} 💎</div></div>`;
        });
        document.getElementById('list-q').innerHTML = h;
    }

    function renderBoosts() {
        document.getElementById('list-b').innerHTML = `
        <div class="card"><div style="flex:1"><b>Буст x2</b><br><small>120 сек.</small></div><button class="btn" onclick="buyB(2,120,5)" ${game.diams<5?'disabled':''}>5 💎</button></div>
        <div class="card"><div style="flex:1"><b>Буст x5</b><br><small>300 сек.</small></div><button class="btn" onclick="buyB(5,300,15)" ${game.diams<15?'disabled':''}>15 💎</button></div>`;
    }

    // Функции управления настройками
    function updateSets() {
        game.settings.music = document.getElementById('set-music').checked;
        game.settings.sfx = document.getElementById('set-sfx').checked;
        game.settings.hd = document.getElementById('set-hd').checked;
        game.settings.theme = document.getElementById('set-theme').checked;
        
        let m = document.getElementById('s-music');
        if(game.settings.music) m.play().catch(()=>{}); else m.pause();
        document.documentElement.style.setProperty('--bg-color', game.settings.theme ? '#000' : '#1a1a1a');
        renderGrid();
        save();
    }

    function exportSave() {
        let code = btoa(JSON.stringify(game));
        prompt("Твой код сохранения (скопируй его):", code);
    }

    function buyS(id){ if(game.coins>=PRICES[id]){ game.coins-=PRICES[id]; game.inv[id]++; play('buy'); save(); render(); } }
    function buyU(c){ if(game.coins>=c){ game.coins-=c; game.upg++; play('buy'); save(); render(); } }
    function nextR(c){ if(game.coins>=c){ game.coins-=c; game.rank++; game.upg=0; play('buy'); save(); render(); } }
    function buyB(m,t,c){ if(game.diams>=c){ game.diams-=c; game.boost=m; game.boostEnd=Date.now()+(t*1000); play('buy'); save(); render(); } }
    
    function checkQ(){ 
        game.quests[0].cur = game.clicks; 
        game.quests.forEach(q=>{if(!q.d && q.cur>=q.trg){q.d=true; game.diams+=q.r;}}); 
    }

    function play(id){ 
        if(!game.settings.sfx) return;
        let a=document.getElementById('s-'+id); 
        if(a) { a.currentTime=0; a.play().catch(()=>{}); }
    }

    function setPage(p){ game.page=p; renderGrid(); }
    function toggleModal(s){ 
        if(s) {
            document.getElementById('set-music').checked = game.settings.music;
            document.getElementById('set-sfx').checked = game.settings.sfx;
            document.getElementById('set-hd').checked = game.settings.hd;
            document.getElementById('set-theme').checked = game.settings.theme;
        }
        document.getElementById('m-sets').style.display=s?'flex':'none'; 
    }
    
    function openTab(t){ 
        ['s','u','q','b'].forEach(x=>{document.getElementById('list-'+x).style.display='none'; document.getElementById('t-'+x).classList.remove('active');});
        document.getElementById('list-'+t).style.display='block'; document.getElementById('t-'+t).classList.add('active');
    }

    function save() {
        localStorage.setItem('slime_m42_v4', JSON.stringify(game));
        if(uID) db.ref('users/'+uID+'/farm').set(game);
    }

    function load() {
        let s = localStorage.getItem('slime_m42_v4');
        if(s) {
            let loaded = JSON.parse(s);
            game = {...game, ...loaded}; 
        }
        firebase.auth().onAuthStateChanged(u => { if(u){ uID=u.uid; db.ref('users/'+uID+'/farm').once('value', s=>{ if(s.exists()){game=s.val(); render();} }); } });
        render();
        if(game.settings.music) document.getElementById('s-music').play().catch(()=>{});
    }

    function fullReset(){ if(confirm("ВНИМАНИЕ: Это полностью удалит прогресс студии Mark-42. Уверены?")){ localStorage.clear(); location.reload(); } }

    setInterval(()=>{ if(game.boostEnd>0 && Date.now()>game.boostEnd){ game.boost=1; game.boostEnd=0; render(); } },1000);
    setInterval(save, 30000);
    window.onload = load;
</script>
</body>
</html>
