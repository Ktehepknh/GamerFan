<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Farm 2D | Mark-42 Studio</title>
    <style>
        :root {
            --accent: #ffcc00; --diam: #00f2ff; --bg: #0b0b0f;
            --panel: rgba(15, 15, 20, 0.98); --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: white; overflow: hidden; }

        #bg-img { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.2); z-index: 1; }

        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        #app.mobile-mode { flex-direction: column; }
        #app.mobile-mode #side { width: 100%; height: 45%; border-left: none; border-top: 3px solid var(--accent); }

        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; }

        /* HUD */
        #hud { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .stat { background: rgba(0,0,0,0.85); padding: 10px 18px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
        .stat img { width: 22px; height: 22px; }

        /* GRID & PAGES */
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; flex: 1; }
        .paddock { background: rgba(255,255,255,0.03); border: 2px solid var(--border); border-radius: 18px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .paddock:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }
        .paddock-label { position: absolute; top: 8px; left: 10px; font-size: 10px; color: var(--accent); font-weight: bold; z-index: 5; }
        
        .page-switcher { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .page-btn { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .page-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .slime-img { position: absolute; width: 40px; height: 40px; pointer-events: none; z-index: 2; will-change: transform; }

        /* SIDE PANEL */
        #side { width: 380px; background: var(--panel); border-left: 3px solid var(--accent); display: flex; flex-direction: column; }
        .tabs { display: flex; background: #000; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .list { flex: 1; overflow-y: auto; padding: 12px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .card b { display: block; margin-bottom: 5px; font-size: 14px; }
        
        .btn-buy { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; font-size: 13px; }
        .btn-buy:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-buy img { width: 16px; height: 16px; }

        /* QUESTS */
        .quest-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #444; position: relative; }
        .quest-item.done { border-color: #00ff88; opacity: 0.7; }
        .quest-reward { color: var(--diam); font-size: 11px; font-weight: bold; }

        /* VICTOR */
        #victor-ui { position: absolute; bottom: 85px; left: 20px; width: 350px; background: var(--panel); border: 2px solid var(--accent); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; z-index: 100; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .vic-face { width: 60px; height: 60px; background: url('assets/viktor.png') center/cover; border: 1px solid var(--accent); border-radius: 10px; flex-shrink: 0; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #15151f; border: 2px solid var(--accent); padding: 25px; border-radius: 20px; width: 320px; text-align: center; }

        #intro { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="bg-img"></div>

<audio id="s-click" src="assets/click.mp3"></audio>
<audio id="s-buy" src="assets/buy.mp3"></audio>
<audio id="s-quest" src="assets/quest.mp3"></audio>
<audio id="s-music" loop src="assets/music.mp3"></audio>

<div id="intro">
    <h1 style="color:var(--accent); letter-spacing: 3px;">SLIME FARM 2D</h1>
    <p style="color:#666; margin-bottom: 20px;">MARK-42 STUDIO ПРЕДСТАВЛЯЕТ</p>
    <input type="text" id="user-name" style="padding:15px; width: 250px; background:#111; border:2px solid var(--accent); color:white; text-align:center; border-radius: 10px;" placeholder="Имя Директора">
    <button class="btn-buy" style="width:200px; margin-top:20px; height: 50px;" onclick="startGame()">ВОЙТИ В ИГРУ</button>
</div>

<div id="m-settings" class="modal">
    <div class="modal-box">
        <h3 style="color:var(--accent); margin:0 0 20px 0;">УПРАВЛЕНИЕ</h3>
        <button class="btn-buy" onclick="toggleMode()" id="mode-btn">РЕЖИМ: PC</button>
        <button class="btn-buy" onclick="toggleMusic()" id="mus-btn">МУЗЫКА: ВЫКЛ</button>
        <button class="btn-buy" onclick="toggleVic()" id="vic-btn">ВИКТОР: ВКЛ</button>
        <button class="btn-buy" onclick="toggleFS()">ПОЛНОЭКРАННЫЙ</button>
        <div style="margin-top:20px; border-top: 1px solid #333; padding-top: 15px;">
            <input type="password" id="adm-in" style="width:100%; padding:8px; background:#000; color:white; border:1px solid #333;" placeholder="Admin Code">
            <button class="btn-buy" style="background:#333; color:white;" onclick="runAdmin()">ДОСТУП</button>
        </div>
        <button class="btn-buy" style="background:#ff4444; margin-top:20px;" onclick="closeSettings()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app" style="display:none">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png"> <span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png"> <span id="d-val">0</span></div>
            <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
                <b id="nick-lab" style="color:var(--accent)"></b>
                <span onclick="openSettings()" style="cursor:pointer; font-size:24px;">⚙️</span>
            </div>
        </div>

        <div id="grid"></div>

        <div class="page-switcher">
            <div class="page-btn active" onclick="setPage(0)">1</div>
            <div class="page-btn" onclick="setPage(1)">2</div>
            <div class="page-btn" onclick="setPage(2)">3</div>
        </div>

        <div id="victor-ui" onclick="vicTalk()">
            <div class="vic-face"></div>
            <div>
                <b style="color:var(--accent)">Виктор:</b>
                <div id="vic-msg" style="font-size:13px;">Привет! Готов заработать миллионы?</div>
            </div>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" onclick="setTab('s', this)">МАГАЗИН</div>
            <div class="tab" onclick="setTab('u', this)">ПРОКАЧКА</div>
            <div class="tab" onclick="setTab('w', this)">НАЙМ</div>
            <div class="tab" onclick="setTab('q', this)">КВЕСТЫ</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-w" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    let game = {
        coins: 50, diams: 10, page: 0,
        inv: new Array(25).fill(0),
        upg: { pwr: 1, auto: false, int: 1 },
        workerLvl: 0, mode: 'PC', music: false, vic: true,
        quests: [], totalClicks: 0
    };

    const WORKER_POWER = [0, 1, 3, 8, 20, 50, 150, 400, 1000, 3000, 8000, 20000, 50000];
    const snd = (id) => { const a = document.getElementById('s-'+id); if(a) { a.currentTime=0; a.play(); } };

    function startGame() {
        const n = document.getElementById('user-name').value;
        if(!n) return;
        game.name = n;
        document.getElementById('nick-lab').innerText = n.toUpperCase();
        document.getElementById('intro').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        generateQuests(); initGrid(); update(); requestAnimationFrame(loop);
    }

    function generateQuests() {
        game.quests = [
            {id:0, t:"Начинающий кликер", target:50, cur:0, rew:5, type:'click', d:false},
            {id:1, t:"Коллекционер", target:5, cur:0, rew:10, type:'buy', d:false},
            {id:2, t:"Магнат", target:5000, cur:0, rew:20, type:'coins', d:false},
            {id:3, t:"Мастер клика", target:200, cur:0, rew:15, type:'click', d:false},
            {id:4, t:"Слаймовод", target:15, cur:0, rew:25, type:'buy', d:false},
            {id:5, t:"Инвестор", target:50000, cur:0, rew:50, type:'coins', d:false},
            {id:6, t:"Профессионал", target:1000, cur:0, rew:40, type:'click', d:false},
            {id:7, t:"Армия слаймов", target:40, cur:0, rew:60, type:'buy', d:false},
            {id:8, t:"Миллиардер", target:1000000, cur:0, rew:100, type:'coins', d:false}
        ];
    }

    function initGrid() {
        const g = document.getElementById('grid'); g.innerHTML = ""; game.slimes = [];
        let start = game.page * 8 + 1;
        for(let i=0; i<8; i++) {
            let id = start + i; if(id > 24) break;
            let p = document.createElement('div');
            p.className = 'paddock';
            p.innerHTML = `<div class="paddock-label">ЗАГОН ${id} | СЛАЙМОВ: ${game.inv[id]}</div>`;
            p.onclick = () => { 
                if(game.inv[id] > 0) { 
                    let gain = (id * game.inv[id] * game.upg.pwr);
                    game.coins += gain; snd('click'); update(); 
                    checkQuest('click', 1); checkQuest('coins', gain);
                } 
            };
            g.appendChild(p);
            for(let n=0; n<game.inv[id]; n++) spawn(id, p);
        }
    }

    function spawn(id, parent) {
        let s = document.createElement('img');
        s.className = 'slime-img'; s.src = `assets/slime${id}.png`;
        s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
        parent.appendChild(s);
        game.slimes.push({ el: s, p: parent, x: Math.random()*100, y: Math.random()*50, vx: (Math.random()-0.5)*0.7, vy: (Math.random()-0.5)*0.7 });
    }

    function loop() {
        game.slimes.forEach(s => {
            let w = s.p.clientWidth-40, h = s.p.clientHeight-40;
            s.x += s.vx; s.y += s.vy;
            if(s.x<0 || s.x>w) s.vx *= -1; if(s.y<0 || s.y>h) s.vy *= -1;
            s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, 0)`;
        });
        requestAnimationFrame(loop);
    }

    function render() {
        // МАГАЗИН (КРАСИВЫЕ ЦЕНЫ)
        let sH = "";
        for(let i=1; i<=24; i++) {
            let cost = Math.round(25 * Math.pow(2.1, i-1) / 5) * 5;
            sH += `<div class="card">
                <div style="display:flex; align-items:center; gap:10px">
                    <img src="assets/slime${i}.png" width="30" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'">
                    <b>Слайм №${i}</b>
                </div>
                <button class="btn-buy" onclick="buyS(${i},${cost})" ${game.coins<cost || game.inv[i]>=16?'disabled':''}>
                    ${cost.toLocaleString()} <img src="assets/coin.png">
                </button>
            </div>`;
        }
        document.getElementById('list-s').innerHTML = sH;

        // ПРОКАЧКА
        document.getElementById('list-u').innerHTML = `
            <div class="card"><b>Сила клика (Ур. ${game.upg.pwr})</b><button class="btn-buy" onclick="buyU('p',${game.upg.pwr*400})">${(game.upg.pwr*400).toLocaleString()} 🟡</button></div>
            <div class="card"><b>Интенсивность (x${game.upg.int})</b><button class="btn-buy" onclick="buyU('i',${game.upg.int*1500})">${(game.upg.int*1500).toLocaleString()} 🟡</button></div>
            <div class="card"><b>Авто-сборщик</b><button class="btn-buy" onclick="buyU('a',2500)" ${game.upg.auto?'disabled':''}>2,500 🟡</button></div>`;

        // КВЕСТЫ
        let qH = "";
        game.quests.forEach(q => {
            qH += `<div class="quest-item ${q.d?'done':''}"><b>${q.t}</b><br><small>Прогресс: ${Math.min(q.cur, q.target)}/${q.target}</small><br><span class="quest-reward">+${q.rew} 💎</span></div>`;
        });
        document.getElementById('list-q').innerHTML = qH;
        
        // НАЙМ
        let next = game.workerLvl + 1;
        if(next < WORKER_POWER.length) {
            let cC = next * 2000; let dC = 10 + (next * 2);
            document.getElementById('list-w').innerHTML = `<div class="card"><b>Работник ${next} Уровня</b>
                <button class="btn-buy" onclick="buyW('c',${cC})">${cC.toLocaleString()} 🟡</button>
                <button class="btn-buy" style="background:var(--diam)" onclick="buyW('d',${dC})">${dC} 💎</button></div>`;
        }
    }

    function buyS(id, c) { game.coins -= c; game.inv[id]++; snd('buy'); initGrid(); update(); checkQuest('buy', 1); }
    function buyU(t, c) { game.coins -= c; if(t==='p') game.upg.pwr++; else if(t==='i') game.upg.int++; else game.upg.auto=true; snd('buy'); update(); }
    function buyW(t, c) { if(t==='c') game.coins -= c; else game.diams -= c; game.workerLvl++; game.upg.auto=true; snd('buy'); update(); }

    function update() {
        document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
        document.getElementById('d-val').innerText = game.diams;
        render();
    }

    function checkQuest(type, val) {
        game.quests.forEach(q => {
            if(!q.d && q.type === type) {
                q.cur += val;
                if(q.cur >= q.target) { q.d = true; game.diams += q.rew; snd('quest'); }
            }
        });
    }

    function vicTalk() {
        const phrases = ["Хорошая работа!", "Посмотри в магазин!", "Квесты дают много алмазов!", "Mark-42 Studio гордится тобой!", "Слаймы любят, когда на них кликают!"];
        document.getElementById('vic-msg').innerText = phrases[Math.floor(Math.random()*phrases.length)];
    }

    function setPage(p) { game.page = p; document.querySelectorAll('.page-btn').forEach((b,i)=>b.className=i===p?'page-btn active':'page-btn'); initGrid(); }
    function setTab(t, el) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); ['s','u','w','q'].forEach(n=>document.getElementById('list-'+n).style.display=t===n?'block':'none'); }
    
    // МЕНЮ
    function openSettings() { document.getElementById('m-settings').style.display='flex'; }
    function closeSettings() { document.getElementById('m-settings').style.display='none'; }
    function toggleMode() { game.mode = game.mode==='PC'?'MOBILE':'PC'; document.getElementById('app').className = game.mode==='MOBILE'?'mobile-mode':''; document.getElementById('mode-btn').innerText = 'РЕЖИМ: '+game.mode; }
    function toggleMusic() { game.music = !game.music; game.music?snd('music'):document.getElementById('s-music').pause(); document.getElementById('mus-btn').innerText='МУЗЫКА: '+(game.music?'ВКЛ':'ВЫКЛ'); }
    function toggleVic() { game.vic = !game.vic; document.getElementById('victor-ui').style.display = game.vic?'flex':'none'; document.getElementById('vic-btn').innerText='ВИКТОР: '+(game.vic?'ВКЛ':'ВЫКЛ'); }
    function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function runAdmin() { if(document.getElementById('adm-in').value==='2014') { game.coins+=1000000; game.diams+=1000; update(); alert('Система взломана!'); } }

    setInterval(() => {
        if(game.upg.auto && game.workerLvl > 0) {
            let b = 0; game.inv.forEach((n, i) => b += (i * n));
            let profit = (b * WORKER_POWER[game.workerLvl] * game.upg.int * 0.1);
            game.coins += profit; update(); checkQuest('coins', profit);
        }
    }, 1000);
</script>
</body>
</html>
