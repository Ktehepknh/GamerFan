<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Clicker 2D | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffcc00;
            --diam: #00f2ff;
            --bg: #0b0b0f;
            --panel: rgba(20, 20, 25, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; height: 100vh; background: #000; color: white; overflow: hidden; }

        /* Задний план */
        #bg-img { 
            position: fixed; inset: 0; 
            background: url('assets/background.jpg') center/cover; 
            filter: brightness(0.25) blur(2px); z-index: 1; 
        }

        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }

        /* Иконки ресурсов */
        .res-icon { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; object-fit: contain; }
        .res-icon.large { width: 24px; height: 24px; }

        /* Главная зона */
        #main { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        
        #hud { 
            display: flex; gap: 15px; margin-bottom: 20px; 
            background: rgba(0,0,0,0.6); padding: 12px 20px; 
            border-radius: 20px; border: 1px solid var(--border);
            backdrop-filter: blur(10px); align-items: center;
        }

        .stat { font-size: 20px; font-weight: 800; display: flex; align-items: center; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .stat-mult { color: var(--accent); font-size: 14px; margin-left: 10px; opacity: 0.8; }

        /* Сетка загонов */
        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 15px; flex: 1; }
        
        .paddock { 
            background: var(--card-bg); border: 2px solid var(--border); 
            border-radius: 24px; position: relative; cursor: pointer; 
            overflow: hidden; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .paddock:hover { border-color: var(--accent); transform: translateY(-2px); background: rgba(255,255,255,0.06); }
        .paddock:active { transform: scale(0.96); }

        .paddock-label { 
            position: absolute; top: 12px; left: 15px; font-size: 11px; 
            color: rgba(255,255,255,0.4); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Слаймы */
        .slime-img { 
            position: absolute; width: 50px; height: 50px; 
            pointer-events: none; z-index: 2;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            animation: slimeJump 2s infinite ease-in-out;
        }

        @keyframes slimeJump {
            0%, 100% { transform: scale(1, 1) translateY(0); }
            50% { transform: scale(1.1, 0.85) translateY(-8px); }
        }

        /* Боковая панель */
        #side { width: 400px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(20px); }
        
        .tabs { display: flex; background: rgba(0,0,0,0.3); padding: 5px; }
        .tab { 
            flex: 1; padding: 15px 5px; text-align: center; cursor: pointer; 
            font-size: 12px; font-weight: 800; color: #666; 
            transition: 0.3s; border-radius: 12px;
        }
        .tab.active { color: var(--accent); background: rgba(255,204,0,0.05); }

        .list { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; }
        .list::-webkit-scrollbar { display: none; }

        /* Карточки */
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 18px; padding: 15px; margin-bottom: 12px; 
            display: flex; align-items: center; gap: 15px;
            transition: 0.2s;
        }
        .card:hover { background: rgba(255,255,255,0.06); border-color: #444; }

        .card-img { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .card-info { flex: 1; }
        .card-title { font-weight: 800; font-size: 15px; margin-bottom: 4px; display: block; }
        .card-price { font-size: 13px; color: #aaa; font-weight: 600; display: flex; align-items: center; }

        .btn-action { 
            background: var(--accent); color: #000; border: none; 
            padding: 10px 18px; border-radius: 12px; font-weight: 800; 
            cursor: pointer; transition: 0.2s; font-size: 13px;
        }
        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        .btn-action:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,204,0,0.4); }

        /* Модальные окна */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 1000; display: none; align-items: center; justify-content: center; 
            backdrop-filter: blur(5px);
        }
        .modal-box { 
            background: #15151a; border: 1px solid var(--accent); 
            padding: 30px; border-radius: 30px; width: 340px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Квесты */
        .q-progress-bg { width: 100%; height: 8px; background: #000; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .q-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

    </style>
</head>
<body>

<audio id="s-click" src="assets/click.mp3"></audio>
<audio id="s-buy" src="assets/buy.mp3"></audio>
<audio id="s-music" loop src="assets/music.mp3"></audio>

<div id="bg-img"></div>

<div id="m-sets" class="modal">
    <div class="modal-box">
        <h2 style="color:var(--accent); margin-top:0;">MARK-42 STUDIO</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 25px;">SLIME CLICKER 2D ULTIMATE</p>
        
        <label style="display:block; text-align:left; font-size:10px; margin-bottom:5px;">МУЗЫКА</label>
        <input type="range" id="vol-m" min="0" max="1" step="0.1" value="0.5" style="width:100%; accent-color:var(--accent);" oninput="setVol()">
        
        <button class="btn-action" style="width:100%; margin-top:30px; background:#ff4444; color:white;" onclick="fullReset()">СБРОС ПРОГРЕССА</button>
        <button class="btn-action" style="width:100%; margin-top:10px; background:#333; color:white;" onclick="toggleModal(false)">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png" class="res-icon large"> <span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png" class="res-icon large"> <span id="d-val">0</span></div>
            <div class="stat-mult">МНОЖИТЕЛЬ: x<span id="m-val">1.0</span></div>
            
            <button class="btn-action" style="margin-left:auto; background:rgba(255,255,255,0.1); color:white;" onclick="toggleModal(true)">⚙️</button>
        </div>

        <div id="grid"></div>

        <div style="display:flex; justify:center; gap:10px; margin-top:20px;">
            <button class="btn-action" style="background:#222; color:white; min-width:60px;" onclick="changePage(0)" id="p0">1</button>
            <button class="btn-action" style="background:#222; color:white; min-width:60px;" onclick="changePage(1)" id="p1">2</button>
            <button class="btn-action" style="background:#222; color:white; min-width:60px;" onclick="changePage(2)" id="p2">3</button>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" id="tab-s" onclick="openTab('s')">МАГАЗИН</div>
            <div class="tab" id="tab-r" onclick="openTab('r')">РАНГИ</div>
            <div class="tab" id="tab-q" onclick="openTab('q')">КВЕСТЫ</div>
            <div class="tab" id="tab-b" onclick="openTab('b')">БУСТЫ</div>
        </div>

        <div id="list-s" class="list"></div>
        <div id="list-r" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
        <div id="list-b" class="list" style="display:none"></div>
    </aside>
</div>

<script>
    // Инициализация Firebase
    const config = {
        apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
        authDomain: "gamesfan-17986.firebaseapp.com",
        projectId: "gamesfan-17986",
        databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
        appId: "1:311654524584:web:9283eea0aea6f7b946849d"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let uID = null;

    // База данных цен (Фикс)
    const SLIME_PRICES = [0, 50, 250, 800, 2000, 5000, 12000, 30000, 75000, 180000, 400000, 900000, 2000000, 5000000, 12000000, 28000000, 65000000, 150000000, 350000000, 800000000, 2000000000, 5000000000, 12000000000, 30000000000, 100000000000];
    
    // Состояние игры
    let game = {
        coins: 100, diams: 5,
        page: 0, inv: new Array(25).fill(0),
        rank: 0, upgCount: [0,0,0,0],
        totalClicks: 0,
        boostMult: 1, boostEnd: 0,
        quests: [
            { id: 0, title: "Новичок", desc: "Кликни 100 раз", target: 100, cur: 0, rew: 10, done: false },
            { id: 1, title: "Слаймовод", desc: "Купи 5 видов слаймов", target: 5, cur: 0, rew: 25, done: false },
            { id: 2, title: "Богатей", desc: "Собери 100,000 монет", target: 100000, cur: 0, rew: 50, done: false }
        ]
    };

    const RANKS = [
        { name: "Медный", color: "#cd7f32", price: 5000 },
        { name: "Железный", color: "#a19d94", price: 50000 },
        { name: "Золотой", color: "#ffcc00", price: 500000 },
        { name: "Алмазный", color: "#00f2ff", price: 5000000 }
    ];

    // Звуки
    function snd(id) {
        let a = document.getElementById('s-'+id);
        a.currentTime = 0; a.play().catch(()=>{});
    }

    function setVol() {
        let v = document.getElementById('vol-m').value;
        let m = document.getElementById('s-music');
        m.volume = v;
        if(m.paused && v > 0) m.play();
    }

    // Сохранение / Загрузка
    function save() {
        localStorage.setItem('slime_ult_save', JSON.stringify(game));
        if(uID) db.ref('users/' + uID + '/farm_v3').set(game);
    }

    function load() {
        let local = localStorage.getItem('slime_ult_save');
        if(local) { game = JSON.parse(local); render(); }
        
        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                uID = user.uid;
                db.ref('users/' + uID + '/farm_v3').once('value', s => {
                    if(s.exists()) { game = s.val(); render(); }
                });
            }
        });
    }

    // Логика множителя
    function getMult() {
        let species = 0;
        game.inv.forEach(count => { if(count > 0) species++; });
        let base = 1 + (species * 0.5); // +0.5 за каждый вид
        let rankBonus = 1 + (game.rank * 1);
        return base * rankBonus * game.boostMult;
    }

    function render() {
        document.getElementById('c-val').innerText = Math.floor(game.coins).toLocaleString();
        document.getElementById('d-val').innerText = game.diams;
        document.getElementById('m-val').innerText = getMult().toFixed(1);
        
        renderGrid();
        renderShop();
        renderRanks();
        renderQuests();
        renderBoosts();
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        let start = game.page * 8 + 1;

        for(let i=0; i<8; i++) {
            let id = start + i;
            if(id > 24) break;

            let p = document.createElement('div');
            p.className = 'paddock';
            p.innerHTML = `<div class="paddock-label">ЗАГОН ${id} • x${game.inv[id]}</div>`;
            
            p.onclick = () => {
                if(game.inv[id] > 0) {
                    game.coins += (id * game.inv[id] * getMult());
                    game.totalClicks++;
                    checkQuests();
                    snd('click');
                    render();
                }
            };

            for(let n=0; n<Math.min(game.inv[id], 6); n++) {
                let s = document.createElement('img');
                s.className = 'slime-img';
                s.src = `assets/slime${id}.png`;
                s.style.left = Math.random()*70 + 5 + "%";
                s.style.top = Math.random()*60 + 10 + "%";
                s.style.animationDelay = Math.random()*2 + "s";
                s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                p.appendChild(s);
                // Плавное «хождение»
                setInterval(() => {
                    s.style.left = Math.random()*70 + 5 + "%";
                    s.style.top = Math.random()*60 + 10 + "%";
                }, 4000 + Math.random()*2000);
            }
            grid.appendChild(p);
        }
    }

    function renderShop() {
        let h = "";
        for(let i=1; i<=24; i++) {
            let price = SLIME_PRICES[i];
            h += `
            <div class="card">
                <img src="assets/slime${i}.png" class="card-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'">
                <div class="card-info">
                    <span class="card-title">Слайм #${i}</span>
                    <span class="card-price"><img src="assets/coin.png" class="res-icon"> ${price.toLocaleString()}</span>
                </div>
                <button class="btn-action" onclick="buySlime(${i})" ${game.coins < price ? 'disabled' : ''}>КУПИТЬ</button>
            </div>`;
        }
        document.getElementById('list-s').innerHTML = h;
    }

    function renderRanks() {
        let currentRank = RANKS[game.rank];
        let h = `<div style="text-align:center; padding: 20px;">
            <h3 style="color:${currentRank.color}; margin:0;">${currentRank.name} Ранг</h3>
            <p style="font-size:12px; opacity:0.6;">Умножает весь доход</p>
        </div>`;

        if(game.rank < 3) {
            let next = RANKS[game.rank+1];
            h += `
            <div class="card">
                <div class="card-info">
                    <span class="card-title">Уровень: ${next.name}</span>
                    <span class="card-price"><img src="assets/coin.png" class="res-icon"> ${next.price.toLocaleString()}</span>
                </div>
                <button class="btn-action" onclick="upRank(${next.price})" ${game.coins < next.price ? 'disabled' : ''}>ПОВЫСИТЬ</button>
            </div>`;
        }
        document.getElementById('list-r').innerHTML = h;
    }

    function renderQuests() {
        let h = "";
        game.quests.forEach(q => {
            let progress = Math.min(100, (q.cur / q.target) * 100);
            h += `
            <div class="card" style="opacity: ${q.done ? 0.4 : 1}">
                <div class="card-info">
                    <span class="card-title">${q.title}</span>
                    <span class="card-price">${q.desc} (+${q.rew} <img src="assets/diamond.png" class="res-icon">)</span>
                    <div class="q-progress-bg"><div class="q-progress-bar" style="width:${progress}%"></div></div>
                </div>
            </div>`;
        });
        document.getElementById('list-q').innerHTML = h;
    }

    function renderBoosts() {
        document.getElementById('list-b').innerHTML = `
            <div class="card">
                <div class="card-info"><span class="card-title">Мега-Клик x2</span><span class="card-price">На 2 минуты</span></div>
                <button class="btn-action" onclick="buyBoost(2, 120, 5)" ${game.diams < 5 ? 'disabled' : ''}>5 <img src="assets/diamond.png" class="res-icon"></button>
            </div>
            <div class="card">
                <div class="card-info"><span class="card-title">Ультра-Клик x5</span><span class="card-price">На 5 минут</span></div>
                <button class="btn-action" onclick="buyBoost(5, 300, 15)" ${game.diams < 15 ? 'disabled' : ''}>15 <img src="assets/diamond.png" class="res-icon"></button>
            </div>`;
    }

    // Действия
    function buySlime(id) {
        if(game.coins >= SLIME_PRICES[id] && game.inv[id] < 16) {
            game.coins -= SLIME_PRICES[id];
            game.inv[id]++;
            snd('buy'); save(); render();
        }
    }

    function upRank(p) {
        if(game.coins >= p) {
            game.coins -= p;
            game.rank++;
            snd('buy'); save(); render();
        }
    }

    function checkQuests() {
        game.quests[0].cur = game.totalClicks;
        game.quests[2].cur = Math.floor(game.coins);
        
        let species = 0;
        game.inv.forEach(c => { if(c > 0) species++; });
        game.quests[1].cur = species;

        game.quests.forEach(q => {
            if(!q.done && q.cur >= q.target) {
                q.done = true;
                game.diams += q.rew;
                snd('buy');
            }
        });
    }

    function buyBoost(m, time, cost) {
        if(game.diams >= cost) {
            game.diams -= cost;
            game.boostMult = m;
            game.boostEnd = Date.now() + (time * 1000);
            snd('buy'); save(); render();
        }
    }

    function changePage(p) {
        game.page = p;
        document.querySelectorAll('.btn-action[id^="p"]').forEach(b => b.style.background = "#222");
        document.getElementById('p'+p).style.background = "var(--accent)";
        renderGrid();
    }

    function openTab(t) {
        document.querySelectorAll('.list').forEach(l => l.style.display = 'none');
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        document.getElementById('list-'+t).style.display = 'block';
        document.getElementById('tab-'+t).classList.add('active');
    }

    function toggleModal(s) { document.getElementById('m-sets').style.display = s ? 'flex' : 'none'; }
    
    function fullReset() {
        if(confirm("ТЫ УВЕРЕН? Вся ферма будет удалена!")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Циклы
    setInterval(() => {
        if(game.boostEnd > 0 && Date.now() > game.boostEnd) {
            game.boostEnd = 0; game.boostMult = 1; render();
        }
    }, 1000);

    setInterval(save, 30000);

    window.onload = () => {
        load();
        changePage(0);
    };
</script>

</body>
</html>
