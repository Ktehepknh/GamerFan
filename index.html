<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELBERR_OS PRO | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00d2ff;
            --bg: #050608;
            --card: #0d1117;
            --border: #30363d;
            --text: #c9d1d9;
            --glow: 0 0 20px rgba(0, 210, 255, 0.4);
            --orange: #ff8c00;
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; overflow: hidden; }

        /* --- AUTH --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #10141b 0%, #050608 100%);
        }
        .auth-card { background: var(--card); border: 2px solid var(--accent); padding: 45px; width: 420px; text-align: center; box-shadow: var(--glow); }
        .auth-card h1 { font-family: 'Orbitron'; color: var(--accent); text-shadow: var(--glow); margin: 0 0 20px 0; }
        
        input, textarea { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; margin: 10px 0; color: var(--accent); font-family: 'Roboto Mono'; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: var(--glow); }

        .btn-main { width: 100%; padding: 15px; border: 1px solid var(--accent); background: rgba(0, 210, 255, 0.1); color: var(--accent); font-family: 'Orbitron'; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-main:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }

        /* --- LAYOUT --- */
        #app { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: #090c10; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { padding: 18px 25px; cursor: pointer; color: #8b949e; border-bottom: 1px solid #161b22; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active { color: var(--accent); background: rgba(0, 210, 255, 0.05); border-left: 4px solid var(--accent); }

        .main { padding: 40px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }

        /* --- GAMES --- */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); padding: 30px 20px; text-align: center; cursor: pointer; }
        .game-card:hover { border-color: var(--accent); box-shadow: var(--glow); transform: translateY(-3px); }
        .game-card i { font-size: 40px; display: block; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--accent)); }
        .game-card b { font-family: 'Orbitron'; font-size: 11px; color: #fff; }

        /* --- CHAT & SOCIAL --- */
        .post { background: #000; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        .nick-orange { color: var(--orange) !important; font-weight: 900; }
        .chip { display: inline-block; padding: 5px 12px; border: 1px solid var(--border); margin: 5px; cursor: pointer; font-size: 11px; }
        .chip.active { border-color: var(--accent); color: var(--accent); box-shadow: var(--glow); }

        /* --- ADMIN PANEL STYLE --- */
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #000; border: 1px solid var(--border); margin-bottom: 10px; }
        
        /* --- LAUNCHER --- */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 15000; display: none; flex-direction: column; }
        .game-bar { background: #0d1117; padding: 10px 25px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--accent); align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>ELBERR_OS</h1>
            <p style="font-size: 10px; color: var(--accent); opacity: 0.6; margin-bottom: 20px;">MARK-42 STUDIO ECOSYSTEM</p>
            <input type="text" id="reg-nick" placeholder="NICKNAME" class="hidden">
            <input type="email" id="reg-email" placeholder="EMAIL">
            <input type="password" id="reg-pass" placeholder="PASSWORD">
            <button class="btn-main" onclick="processAuth()" id="main-auth-btn">ENTER_SYSTEM</button>
            <button class="btn-main" style="border-color:#555; color:#555" onclick="auth.signInAnonymously()">GUEST_ACCESS</button>
            <p id="toggle-txt" style="margin-top:20px; cursor:pointer; font-size:11px; color:var(--accent)" onclick="toggleAuthMode()">Создать новый узел</p>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding: 35px 25px; border-bottom: 1px solid var(--border);"><b style="font-family:'Orbitron'; color:var(--accent); font-size:18px;">MARK-42 PRO</b></div>
            <div class="nav-item active" onclick="tab('games', this)">Библиотека</div>
            <div class="nav-item" onclick="tab('social', this)">Сообщество</div>
            <div class="nav-item" onclick="tab('messenger', this)">Мессенджер</div>
            <div class="nav-item" onclick="tab('settings', this)">Настройки</div>
            <div class="nav-item" onclick="tryAdminAccess(this)" style="color:var(--orange)">[ADMIN_ROOT]</div>
            
            <div style="margin-top: auto; padding: 25px; border-top: 1px solid var(--border);">
                <div id="user-status" style="font-weight: bold; font-size: 11px;">Loading...</div>
                <button onclick="auth.signOut()" style="background:none; border:none; color:red; cursor:pointer; font-size:10px; margin-top:10px;">ВЫЙТИ</button>
            </div>
        </aside>

        <main class="main">
            <div id="v-games" class="view active">
                <h2 style="font-family:'Orbitron'; color:var(--accent)">> SOFTWARE_ARCHIVE</h2>
                <div class="games-grid" id="games-container"></div>
            </div>

            <div id="v-social" class="view">
                <h2 style="font-family:'Orbitron'; color:var(--accent)">> GF_NETWORK</h2>
                <div class="id-box" style="border: 1px dashed var(--accent); padding:15px; margin-bottom:20px;">
                    <small style="color:var(--accent)">IDENTITY:</small>
                    <div id="chips-container"></div>
                    <button onclick="addIdentity()" style="background:none; border:none; color:var(--accent); font-size:10px; cursor:pointer;">+ add personality</button>
                </div>
                <textarea id="post-input" placeholder="Введите сообщение..."></textarea>
                <button class="btn-main" style="width:200px" onclick="sendPost()">ОТПРАВИТЬ</button>
                <div id="feed" style="margin-top:30px"></div>
            </div>

            <div id="v-messenger" class="view">
                <h2 style="font-family:'Orbitron'; color:var(--accent)">> SECURE_MESSAGES</h2>
                <div style="display:grid; grid-template-columns: 200px 1fr; gap:20px; height:500px; background:rgba(255,255,255,0.02); border:1px solid var(--border);">
                    <div id="contacts" style="border-right:1px solid var(--border); overflow-y:auto; padding:10px;"></div>
                    <div style="display:flex; flex-direction:column;">
                        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:20px;"></div>
                        <input type="text" id="msg-input" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                    </div>
                </div>
            </div>

            <div id="v-adm" class="view">
                <h2 style="font-family:'Orbitron'; color:var(--orange)">> ROOT_ACCESS_GRANTED</h2>
                <div id="admin-users-list" style="margin-top:20px;"></div>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
                <button class="btn-main" style="border-color:red; color:red; width:auto;" onclick="if(confirm('WIPE FEED?')) db.ref('posts').remove()">ОЧИСТИТЬ ВСЕ ПОСТЫ</button>
            </div>
        </main>
    </div>

    <div id="game-overlay">
        <div class="game-bar"><b id="gtxt" style="font-family:'Orbitron'; color:var(--accent)">LOADING...</b><button onclick="closeGame()" style="background:none; border:1px solid red; color:red; padding:5px 15px; cursor:pointer;">CLOSE [X]</button></div>
        <iframe id="gframe" style="flex:1; border:none; background:#000;"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            projectId: "gamesfan-17986"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let isLogin = true, selectedNick = "", myData = { identities: [] }, currentChat = "";

        const GAMES = [
            { n: "ELBERR OS: Ch 1", p: "ELBERR_OS/Chapter1/index.html", i: "💾" },
            { n: "ELBERR OS: Ch 2", p: "ELBERR_OS/Chapter2/index.html", i: "🔐" },
            { n: "ELBERR OS: Ch 3", p: "ELBERR_OS/Chapter3/index.html", i: "⚙️" },
            { n: "ELBERR OS: Ch 4", p: "ELBERR_OS/Chapter4/index.html", i: "💿" },
            { n: "ELBERR OS: Ch 5", p: "ELBERR_OS/Chapter5/index.html", i: "📡" },
            { n: "ELBERR OS: Ch 6", p: "ELBERR_OS/Chapter6/index.html", i: "🧠" },
            { n: "Slime Clicker 2D", p: "Slime_Clicker/index.html", i: "🧪" },
            { n: "Slime Farm 2D", p: "Slime_Farm_2D/index.html", i: "🚜" },
            { n: "Slime Farm 2", p: "Slime_Farm2/index.html", i: "🍄" }
        ];

        // --- AUTH ---
        function toggleAuthMode() { isLogin = !isLogin; document.getElementById('reg-nick').classList.toggle('hidden', isLogin); document.getElementById('main-auth-btn').innerText = isLogin ? "ENTER_SYSTEM" : "CREATE_IDENTITY"; }
        async function processAuth() {
            const e = document.getElementById('reg-email').value, p = document.getElementById('reg-pass').value;
            try { if(isLogin) await auth.signInWithEmailAndPassword(e,p); else { const r = await auth.createUserWithEmailAndPassword(e,p); await db.ref('users/'+r.user.uid).set({nick: document.getElementById('reg-nick').value, email: e, identities: [document.getElementById('reg-nick').value]}); } } catch(err){alert(err.message);}
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                db.ref('users/' + user.uid).on('value', s => {
                    myData = s.val() || { nick: "Гость", identities: ["Гость"] };
                    document.getElementById('user-status').innerText = myData.nick;
                    if(user.email === "vetrovlev1@gmail.com") document.getElementById('user-status').className = 'nick-orange';
                    renderIdentities();
                });
                renderGames(); loadPosts(); loadContacts();
            } else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
        });

        // --- CORE FUNCTIONS ---
        function renderGames() { document.getElementById('games-container').innerHTML = GAMES.map(g => `<div class="game-card" onclick="launch('${g.p}', '${g.n}')"><i>${g.i}</i><b>${g.n}</b></div>`).join(''); }
        function tab(id, el) { 
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); 
            document.getElementById('v-' + id).classList.add('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
            if(el) el.classList.add('active'); 
        }

        function renderIdentities() {
            const ids = [...new Set([myData.nick, ...(myData.identities || [])])];
            document.getElementById('chips-container').innerHTML = ids.map(id => `<div class="chip ${selectedNick===id?'active':''}" onclick="selectedNick='${id}';renderIdentities()">${id}</div>`).join('');
            if(!selectedNick) selectedNick = ids[0];
        }

        function addIdentity() { const n = prompt("Identity name:"); if(n){ myData.identities = myData.identities || []; myData.identities.push(n); db.ref('users/'+auth.currentUser.uid+'/identities').set(myData.identities); } }

        function sendPost() {
            const t = document.getElementById('post-input').value; if(!t.trim()) return;
            db.ref('posts').push({author: selectedNick, text: t, isCreator: (auth.currentUser.email === "vetrovlev1@gmail.com" && selectedNick.includes("Creater")), time: Date.now()});
            document.getElementById('post-input').value = "";
        }

        function loadPosts() {
            db.ref('posts').limitToLast(50).on('value', s => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                let ps = []; s.forEach(c => ps.push(c.val()));
                ps.reverse().forEach(p => { f.innerHTML += `<div class="post"><b class="${p.isCreator?'nick-orange':''}">${p.author}:</b><p>${p.text}</p></div>`; });
            });
        }

        // --- MESSENGER ---
        function loadContacts() {
            db.ref('users').on('value', snap => {
                const cont = document.getElementById('contacts'); cont.innerHTML = "";
                snap.forEach(u => {
                    if(u.key !== auth.currentUser.uid) {
                        cont.innerHTML += `<div class="nav-item" onclick="startChat('${u.key}', '${u.val().nick}')">${u.val().nick}</div>`;
                    }
                });
            });
        }
        function startChat(uid, name) { currentChat = uid; document.getElementById('chat-messages').innerHTML = "Чат с " + name; loadMessages(); }
        function sendMsg() {
            const t = document.getElementById('msg-input').value; if(!t.trim() || !currentChat) return;
            const chatID = [auth.currentUser.uid, currentChat].sort().join('_');
            db.ref('chats/' + chatID).push({ sender: myData.nick, text: t, time: Date.now() });
            document.getElementById('msg-input').value = "";
        }
        function loadMessages() {
            const chatID = [auth.currentUser.uid, currentChat].sort().join('_');
            db.ref('chats/' + chatID).on('value', snap => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                snap.forEach(m => {
                    box.innerHTML += `<div style="margin-bottom:10px; color:${m.val().sender===myData.nick? 'var(--accent)':'#fff'}"><b>${m.val().sender}:</b> ${m.val().text}</div>`;
                });
            });
        }

        // --- ADMIN LOGIC ---
        function tryAdminAccess(el) {
            const pass = prompt("ROOT_ACCESS_PASSWORD:");
            if (pass === "12.02.2014") { tab('adm', el); loadAdminPanel(); } else { alert("ACCESS DENIED"); }
        }
        function loadAdminPanel() {
            db.ref('users').on('value', snap => {
                const list = document.getElementById('admin-users-list');
                list.innerHTML = "<h4>УПРАВЛЕНИЕ УЗЛАМИ:</h4><br>";
                snap.forEach(u => {
                    list.innerHTML += `<div class="user-row">
                        <span>${u.val().nick} (${u.val().email || 'Guest'})</span>
                        <button onclick="db.ref('users/${u.key}').remove()" style="color:red; background:none; border:1px solid red; cursor:pointer; padding:5px;">[DELETE]</button>
                    </div>`;
                });
            });
        }

        function launch(p, t) { document.getElementById('game-overlay').style.display = 'flex'; document.getElementById('gtxt').innerText = "> " + t; document.getElementById('gframe').src = p; }
        function closeGame() { document.getElementById('game-overlay').style.display = 'none'; document.getElementById('gframe').src = ""; }
    </script>
</body>
</html>
