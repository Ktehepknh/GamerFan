<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamesFan OS | Professional Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* Стиль из твоего файла с неоновыми правками */
        :root {
            --g-blue: #00d2ff; --g-bg: #050608; --g-surface: #0d1117;
            --g-border: #30363d; --g-text: #c9d1d9; --vk-blue: #0077ff;
        }
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body { background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        /* AUTH */
        #auth-screen { position: fixed; inset: 0; background: var(--g-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { width: 380px; padding: 35px; border: 1px solid var(--g-blue); border-radius: 2px; text-align: center; background: var(--g-surface); box-shadow: 0 0 15px rgba(0,210,255,0.2); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--g-border); background: #000; color: var(--g-blue); outline: none; }

        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: #090c10; border-right: 1px solid var(--g-border); display: flex; flex-direction: column; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #8b949e; border-bottom: 1px solid #161b22; }
        .nav-item:hover, .nav-item.active { color: var(--g-blue); background: rgba(0,210,255,0.05); }
        .main { padding: 30px; overflow-y: auto; }

        /* GAMES GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .game-card { background: #000; border: 1px solid var(--g-border); padding: 15px; text-align: center; cursor: pointer; }
        .game-card:hover { border-color: var(--g-blue); transform: translateY(-3px); }
        .game-icon { font-size: 40px; margin-bottom: 10px; display: block; }

        /* MESSENGER & COMMUNITY */
        #messenger-overlay { position: fixed; inset: 0; background: #000; z-index: 10001; display: none; flex-direction: column; }
        .ms-body { flex: 1; display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }
        .u-list { background: #0d1117; border-right: 1px solid var(--g-border); overflow-y: auto; }
        .chat-area { display: flex; flex-direction: column; background: #050608; }
        #pm-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-out { background: var(--vk-blue); align-self: flex-end; padding: 10px; border-radius: 10px; }
        .m-in { background: #30363d; align-self: flex-start; padding: 10px; border-radius: 10px; }

        .hidden { display: none !important; }
        .view { display: none; }
        .view.active { display: block; }
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 20000; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family: 'Orbitron'; color:var(--g-blue);">GAMESFAN OS</h2>
            <p id="auth-status" style="font-size: 10px; margin-bottom: 10px;">Авторизация в терминале</p>
            <input type="text" id="auth-n" placeholder="НИКНЕЙМ" class="hidden">
            <input type="email" id="auth-e" placeholder="EMAIL">
            <input type="password" id="auth-p" placeholder="ПАРОЛЬ">
            <button class="btn-blue" id="auth-btn" style="width:100%; padding:10px; background:transparent; color:var(--g-blue); border:1px solid var(--g-blue); cursor:pointer;" onclick="handleAuth()">ВОЙТИ</button>
            <p id="toggle-auth" style="margin-top:15px; font-size:12px; cursor:pointer; color:var(--g-blue);" onclick="toggleAuthMode()">Создать аккаунт</p>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding:25px; color:var(--g-blue); font-family:'Orbitron'; font-weight:700;">GF_OS v5.0</div>
            <div class="nav-item active" onclick="tab('lib', this)">🎮 Игры</div>
            <div class="nav-item" onclick="tab('comm', this)">📢 Сообщество</div>
            <div class="nav-item" onclick="openMessenger()" style="color:var(--vk-blue);">💬 Messenger</div>
            <div id="adm-nav" class="nav-item hidden" onclick="tryAdminAccess(this)" style="color:#ff4444;">🛡️ ROOT CONTROL</div>
            <div id="cur-u" style="margin-top:auto; padding:25px; border-top:1px solid var(--g-border);">...</div>
        </aside>

        <main class="main">
            <div id="v-lib" class="view active">
                <h1 style="font-family:'Orbitron'">LIBRARY</h1><br>
                <div class="grid" id="game-list"></div>
            </div>

            <div id="v-comm" class="view">
                <h1 style="font-family:'Orbitron'">COMMUNITY</h1><br>
                <div id="post-ui">
                    <textarea id="post-in" style="width:100%; background:#000; color:#fff; padding:10px;" placeholder="Что нового?"></textarea>
                    <button onclick="sendPost()" style="padding:10px; background:var(--g-blue); border:none; margin-top:5px; cursor:pointer;">Опубликовать</button>
                </div>
                <div id="feed" style="margin-top:20px;"></div>
            </div>

            <div id="v-adm" class="view">
                <h1 style="color:#ff4444; font-family:'Orbitron'">ROOT_TERMINAL</h1><br>
                <div id="adm-users-list"></div>
            </div>
        </main>
    </div>

    <div id="messenger-overlay">
        <div style="background:var(--vk-blue); padding:15px; display:flex; justify-content:space-between;">
            <b>Gamer's Messenger</b>
            <button onclick="closeMessenger()" style="background:none; border:1px solid white; color:white; cursor:pointer;">ЗАКРЫТЬ</button>
        </div>
        <div class="ms-body">
            <div class="u-list" id="ms-u-box"></div>
            <div class="chat-area">
                <div id="pm-messages"></div>
                <div style="padding:20px; display:flex; gap:10px;">
                    <input id="pm-in" style="margin:0;" placeholder="Сообщение...">
                    <button onclick="sendPM()" style="padding:10px; background:var(--vk-blue); border:none; color:white;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-overlay">
        <div style="background:#1c1c1c; padding:10px; display:flex; justify-content:space-between;">
            <b id="game-title">Загрузка...</b>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 15px; cursor:pointer;">ЗАКРЫТЬ</button>
        </div>
        <iframe id="game-frame" style="flex:1; border:none;"></iframe>
    </div>

    <script>
        const cfg = { apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI", authDomain: "gamesfan-17986.firebaseapp.com", databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/", projectId: "gamesfan-17986" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.database();

        let myNick = "", selUID = null, currentAuthMode = "login", adminUnlocked = false;

        const GAMES = [
            { n: "ELBERR OS: Ch. 1", p: "ELBERR_OS/Chapter1/index.html", ico: "📁" },
            { n: "ELBERR OS: Ch. 2", p: "ELBERR_OS/Chapter2/index.html", ico: "🔐" },
            { n: "ELBERR OS: Ch. 3", p: "ELBERR_OS/Chapter3/index.html", ico: "🔌" },
            { n: "ELBERR OS: Ch. 4", p: "ELBERR_OS/Chapter4/index.html", ico: "💾" },
            { n: "ELBERR OS: Ch. 5", p: "ELBERR_OS/Chapter5/index.html", ico: "📡" },
            { n: "ELBERR OS: Ch. 6", p: "ELBERR_OS/Chapter6/index.html", ico: "🧠" },
            { n: "Slime Clicker", p: "Slime_Clicker/index.html", ico: "🧪" },
            { n: "Slime Farm 2D", p: "Slime_Farm_2D/index.html", ico: "🚜" }
        ];

        // --- AUTH LOGIC (ТВОЯ ЛЮБИМАЯ ВЕРСИЯ) ---
        function toggleAuthMode() {
            const nickInput = document.getElementById('auth-n');
            const authBtn = document.getElementById('auth-btn');
            const authStatus = document.getElementById('auth-status');
            const toggleLink = document.getElementById('toggle-auth');
            if (currentAuthMode === "login") {
                currentAuthMode = "reg"; nickInput.classList.remove('hidden');
                authBtn.innerText = "ЗАРЕГИСТРИРОВАТЬСЯ"; authStatus.innerText = "Регистрация нового узла";
                toggleLink.innerText = "Уже есть аккаунт? Войти";
            } else {
                currentAuthMode = "login"; nickInput.classList.add('hidden');
                authBtn.innerText = "ВОЙТИ"; authStatus.innerText = "Авторизация в терминале";
                toggleLink.innerText = "Создать аккаунт";
            }
        }

        async function handleAuth() {
            const e=document.getElementById('auth-e').value.trim(), p=document.getElementById('auth-p').value.trim(), n=document.getElementById('auth-n').value.trim();
            if(!e || !p) return alert("Заполните поля!");
            try {
                if(currentAuthMode === "login") await auth.signInWithEmailAndPassword(e, p);
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({ nick: n, email: e, xp: 0, lvl: 1 });
                    alert("Профиль создан!");
                }
            } catch(ex) { alert(ex.message); }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                if(u.email === "vetrovlev1@gmail.com") document.getElementById('adm-nav').classList.remove('hidden');
                db.ref('users/' + u.uid).on('value', s => {
                    myNick = s.val()?.nick || "User";
                    document.getElementById('cur-u').innerText = "CONNECTED: " + myNick;
                });
                drawGames(); loadUsers(); loadPosts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // --- GAMES & SYSTEM ---
        function drawGames() {
            const container = document.getElementById('game-list'); container.innerHTML = "";
            GAMES.forEach(g => {
                container.innerHTML += `<div class="game-card" onclick="play('${g.p}', '${g.n}')">
                    <span class="game-icon">${g.ico}</span><b>${g.n}</b></div>`;
            });
        }
        function play(path, name) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title').innerText = name;
            document.getElementById('game-frame').src = path;
        }
        function closeGame() { document.getElementById('game-overlay').style.display = 'none'; document.getElementById('game-frame').src = ""; }

        function tab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        // --- MESSENGER & COMMUNITY (ИЗ ТВОЕГО ФАЙЛА) ---
        function openMessenger() { document.getElementById('messenger-overlay').style.display = 'flex'; }
        function closeMessenger() { document.getElementById('messenger-overlay').style.display = 'none'; }
        
        function loadUsers() {
            db.ref('users').on('value', s => {
                const box = document.getElementById('ms-u-box'); box.innerHTML = "";
                s.forEach(u => {
                    if(u.key === auth.currentUser.uid) return;
                    const div = document.createElement('div'); div.style.padding = "15px"; div.style.cursor = "pointer";
                    div.innerHTML = `<b>${u.val().nick}</b>`;
                    div.onclick = () => { selUID = u.key; openChat(u.val().nick); };
                    box.appendChild(div);
                });
            });
        }
        function openChat(name) {
            const id = [auth.currentUser.uid, selUID].sort().join('_');
            db.ref('chats/' + id).on('value', s => {
                const b = document.getElementById('pm-messages'); b.innerHTML = "";
                s.forEach(m => { b.innerHTML += `<div class="${m.val().from===auth.currentUser.uid?'m-out':'m-in'}">${m.val().t}</div>`; });
            });
        }
        function sendPM() {
            const t = document.getElementById('pm-in').value; if(!t.trim() || !selUID) return;
            const id = [auth.currentUser.uid, selUID].sort().join('_');
            db.ref('chats/' + id).push({ from: auth.currentUser.uid, t: t });
            document.getElementById('pm-in').value = "";
        }

        function sendPost() {
            const t = document.getElementById('post-in').value; if(!t.trim()) return;
            db.ref('community/main').push({ author: myNick, txt: t, time: Date.now() });
            document.getElementById('post-in').value = "";
        }
        function loadPosts() {
            db.ref('community/main').on('value', s => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                s.forEach(p => { f.innerHTML = `<div style="border:1px solid #333; padding:10px; margin-bottom:10px;"><b>${p.val().author}:</b><p>${p.val().txt}</p></div>` + f.innerHTML; });
            });
        }

        function tryAdminAccess(el) {
            if(adminUnlocked) return tab('adm', el);
            if(prompt("ROOT PASSWORD:") === "12.02.2014") { adminUnlocked = true; tab('adm', el); loadAdminData(); }
        }
        function loadAdminData() {
            db.ref('users').on('value', s => {
                const b = document.getElementById('adm-users-list'); b.innerHTML = "";
                s.forEach(u => { b.innerHTML += `<div>${u.val().nick} <button onclick="db.ref('users/${u.key}').remove()">Удалить</button></div>`; });
            });
        }
    </script>
</body>
</html>
