<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamesFan OS | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --vk-blue: #0077ff; --vk-bg: #ebedf0; --vk-white: #ffffff;
            --g-blue: #1a73e8; --g-bg: #ffffff; --g-surface: #f8f9fa;
            --g-border: #dadce0; --g-text: #202124; --g-text-light: #5f6368;
            --orange: #ff8c00; --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --danger: #d93025;
        }
        [data-theme="dark"] {
            --g-bg: #0b0e14; --g-surface: #1c2128; --g-border: #444c56;
            --g-text: #adbac7; --g-text-light: #768390; --vk-bg: #15151a; --vk-white: #1c2128;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        #auth-screen { position: fixed; inset: 0; background: var(--g-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { width: 380px; padding: 35px; border: 1px solid var(--g-border); border-radius: 20px; text-align: center; box-shadow: var(--shadow); background: var(--g-bg); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--g-border); border-radius: 8px; background: var(--g-surface); color: var(--g-text); outline: none; }

        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: var(--g-surface); border-right: 1px solid var(--g-border); padding: 25px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 14px 25px; cursor: pointer; color: var(--g-text-light); border-radius: 0 30px 30px 0; margin-right: 15px; margin-bottom: 5px; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item:hover { background: rgba(0,0,0,0.05); }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); border-left: 5px solid var(--g-blue); }
        
        .main { padding: 30px; overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        
        .card-box { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn-blue { background: var(--g-blue); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; }

        /* GAMES GRID */
        .search-bar { margin-bottom: 20px; width: 100%; max-width: 400px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .game-card { text-align: center; cursor: pointer; padding: 15px; transition: 0.2s; border: 1px solid var(--g-border); border-radius: 12px; background: var(--g-surface); }
        .game-card:hover { transform: translateY(-5px); border-color: var(--g-blue); }
        .game-icon { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 8px; object-fit: cover; }

        /* MESSENGER */
        #messenger-overlay { position: fixed; inset: 0; background: var(--vk-bg); z-index: 10001; display: none; flex-direction: column; }
        .ms-header { height: 60px; background: var(--vk-blue); color: white; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .ms-body { flex: 1; display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }
        .u-list { background: var(--vk-white); border-right: 1px solid rgba(0,0,0,0.1); overflow-y: auto; }
        .u-card { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; gap: 12px; }
        .chat-area { display: flex; flex-direction: column; background: var(--vk-bg); height: 100%; position: relative; }
        #pm-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .msg { padding: 10px 15px; border-radius: 16px; max-width: 70%; font-size: 14px; }
        .m-in { background: var(--vk-white); align-self: flex-start; }
        .m-out { background: #ceeafe; align-self: flex-end; }

        /* GAME OVERLAY */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 20000; display: none; flex-direction: column; }
        .game-header { height: 50px; background: #1c1c1c; color: white; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #game-frame { flex: 1; border: none; }
        #game-frame.fullscreen { position: fixed; inset: 0; z-index: 20001; }

        /* ADMIN */
        .adm-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--g-border); font-size: 14px; }
        .adm-section { margin-bottom: 30px; }

        .hidden { display: none !important; }
        .nick-orange { color: var(--orange) !important; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:20px; display:none; z-index:30000;"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--g-blue); margin-bottom:10px;">Mark-42 Studio</h2>
            <input type="text" id="reg-n" placeholder="Никнейм" class="hidden">
            <input type="email" id="reg-e" placeholder="Email">
            <input type="password" id="reg-p" placeholder="Пароль">
            <button class="btn-blue" style="width:100%; margin-top:10px;" onclick="handleAuth()">ВОЙТИ</button>
            <p id="auth-toggle" style="margin-top:15px; font-size:12px; cursor:pointer;" onclick="toggleAuth()">Создать аккаунт</p>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding:0 25px 30px; color:var(--g-blue); font-weight:700; font-size:20px;">GamesFan OS</div>
            <div class="nav-item active" onclick="tab('lib', this)">🎮 <span>Игры</span></div>
            <div class="nav-item" onclick="tab('comm', this)">📢 <span>Сообщества</span></div>
            <div class="nav-item" onclick="openMessenger()" style="color:var(--vk-blue);">💬 <span>Messenger</span></div>
            <div id="adm-nav" class="nav-item hidden" onclick="tryAdminAccess(this)" style="color:var(--danger); border-top:1px solid var(--g-border); margin-top:10px;">🛡️ <span>ROOT CONTROL</span></div>
            <div id="cur-u" style="margin-top:auto; padding:25px; border-top:1px solid var(--g-border); font-size:13px;">...</div>
        </aside>

        <main class="main">
            <div id="v-lib" class="view active">
                <h1>Библиотека Игр</h1><br>
                <input type="text" class="search-bar" id="game-search" placeholder="Поиск игры..." oninput="renderLibrary()">
                <div class="grid" id="lib-grid"></div>
            </div>

            <div id="v-comm" class="view">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn-blue" id="tab-news" onclick="setComm('news', this)">Новости</button>
                    <button class="btn-blue" style="background:gray" onclick="setComm('suggest', this)">Предложения</button>
                </div>
                <div class="card-box" id="post-ui">
                    <textarea id="post-in" placeholder="Напишите здесь..."></textarea>
                    <button class="btn-blue" style="float:right" onclick="sendPost()">Опубликовать</button>
                    <div style="clear:both"></div>
                </div>
                <div id="feed"></div>
            </div>

            <div id="v-adm" class="view">
                <h1 style="color:var(--danger);">🛡️ ROOT CONTROL</h1><br>
                
                <div class="adm-section">
                    <h3>👥 Управление пользователями</h3>
                    <div class="card-box" id="adm-users-list"></div>
                </div>

                <div class="adm-section">
                    <h3>🕵️ Шпионский режим (Все чаты)</h3>
                    <div class="card-box" id="adm-chats-list"></div>
                </div>

                <div class="adm-section">
                    <h3>🤖 Создать фейк-аккаунт</h3>
                    <div class="card-box">
                        <input type="text" id="fake-n" placeholder="Ник">
                        <input type="text" id="fake-e" placeholder="Email">
                        <button class="btn-blue" onclick="createFakeUser()">СОЗДАТЬ</button>
                    </div>
                </div>

                <div class="adm-section">
                    <h3>☢️ Опасная зона</h3>
                    <button class="btn-danger" onclick="wipeData('community')">ОЧИСТИТЬ ПОСТЫ</button>
                    <button class="btn-danger" onclick="wipeData('chats')">ОЧИСТИТЬ ЧАТЫ</button>
                </div>
            </div>
        </main>
    </div>

    <div id="messenger-overlay">
        <div class="ms-header">
            <span>Gamer's Messenger</span>
            <button onclick="closeMessenger()" style="background:none; border:1px solid white; color:white; padding:5px; cursor:pointer;">ЗАКРЫТЬ ✖</button>
        </div>
        <div class="ms-body">
            <div class="u-list" id="ms-u-box"></div>
            <div class="chat-area">
                <div id="ms-target-name" style="padding:15px; background:var(--vk-white); font-weight:bold;">Выберите чат</div>
                <div id="pm-messages"></div>
                <div style="padding:15px; display:flex; gap:10px; background:var(--vk-white);">
                    <textarea id="pm-in" placeholder="Сообщение..."></textarea>
                    <button class="btn-blue" onclick="sendPM()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-overlay">
        <div class="game-header">
            <b id="game-title">Загрузка...</b>
            <button class="btn-blue" onclick="toggleFullscreen()">РАЗВЕРНУТЬ</button>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 15px; cursor:pointer;">ЗАКРЫТЬ ✖</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        const cfg = { apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI", authDomain: "gamesfan-17986.firebaseapp.com", databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/", projectId: "gamesfan-17986" };
        firebase.initializeApp(cfg);
        const auth = firebase.auth(), db = firebase.database();

        let isLog = true, myNick = "", selUID = null, curComm = "news", adminUnlocked = false;

        const GAMES = [
            { n: "Slime Clicker", p: "Slime_Clicker/index.html", i: "https://cdn-icons-png.flaticon.com/512/826/826908.png" },
            { n: "Slime Farm 2D", p: "Slime_Farm_2D/index.html", i: "https://cdn-icons-png.flaticon.com/512/2392/2392326.png" },
            { n: "Elber OS: Chapter 1", p: "elber_os/chapter1/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" },
            { n: "Elber OS: Chapter 2", p: "elber_os/chapter2/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" },
            { n: "Elber OS: Chapter 3", p: "elber_os/chapter3/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" },
            { n: "Elber OS: Chapter 4", p: "elber_os/chapter4/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" },
            { n: "Elber OS: Chapter 5", p: "elber_os/chapter5/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" },
            { n: "Elber OS: Chapter 6", p: "elber_os/chapter6/index.html", i: "https://cdn-icons-png.flaticon.com/512/1055/1055683.png" }
        ];

        function toast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

        function toggleAuth() {
            isLog = !isLog;
            document.getElementById('reg-n').classList.toggle('hidden');
            document.querySelector('.auth-card button').innerText = isLog ? "ВОЙТИ" : "РЕГИСТРАЦИЯ";
            document.getElementById('auth-toggle').innerText = isLog ? "Создать аккаунт" : "Уже есть аккаунт?";
        }

        async function handleAuth() {
            const e=document.getElementById('reg-e').value, p=document.getElementById('reg-p').value, n=document.getElementById('reg-n').value;
            try {
                if(isLog) await auth.signInWithEmailAndPassword(e, p);
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({ nick: n, email: e, isBanned: false, isMuted: false });
                }
            } catch(ex) { toast(ex.message); }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                db.ref('users/' + u.uid).once('value', s => {
                    if(s.val()?.isBanned) { auth.signOut(); alert("ВЫ ЗАБАНЕНЫ"); return; }
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'grid';
                    const isOwner = (u.email === "vetrovlev1@gmail.com");
                    if(isOwner) document.getElementById('adm-nav').classList.remove('hidden');
                    myNick = s.val()?.nick || "User";
                    document.getElementById('cur-u').innerText = myNick;
                    if(isOwner) document.getElementById('cur-u').classList.add('nick-orange');
                    renderLibrary(); loadUsers(); loadPosts();
                });
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // GAMES
        function renderLibrary() {
            const query = document.getElementById('game-search').value.toLowerCase();
            const grid = document.getElementById('lib-grid'); grid.innerHTML = "";
            GAMES.filter(g => g.n.toLowerCase().includes(query)).forEach(g => {
                grid.innerHTML += `<div class="game-card" onclick="play('${g.p}', '${g.n}')">
                    <img src="${g.i}" class="game-icon"><div><b>${g.n}</b></div></div>`;
            });
        }
        function play(path, name) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title').innerText = name;
            document.getElementById('game-frame').src = path;
        }
        function closeGame() { document.getElementById('game-overlay').style.display = 'none'; document.getElementById('game-frame').src = ""; }
        function toggleFullscreen() { document.getElementById('game-frame').requestFullscreen(); }

        // MESSENGER
        function openMessenger() { document.getElementById('messenger-overlay').style.display = 'flex'; }
        function closeMessenger() { document.getElementById('messenger-overlay').style.display = 'none'; }
        
        function loadUsers() {
            db.ref('users').on('value', s => {
                const box = document.getElementById('ms-u-box'); box.innerHTML = "";
                s.forEach(u => {
                    if(u.key === auth.currentUser.uid) return;
                    box.innerHTML += `<div class="u-card" onclick="selUID='${u.key}'; openChat('${u.val().nick}')">
                        <div style="width:10px; height:10px; border-radius:50%; background:green;"></div><b>${u.val().nick}</b></div>`;
                });
            });
        }
        function openChat(name) {
            document.getElementById('ms-target-name').innerText = name;
            const id = [auth.currentUser.uid, selUID].sort().join('_');
            db.ref('chats/' + id).on('value', s => {
                const b = document.getElementById('pm-messages'); b.innerHTML = "";
                s.forEach(m => { b.innerHTML += `<div class="msg ${m.val().from===auth.currentUser.uid?'m-out':'m-in'}">${m.val().t}</div>`; });
                b.scrollTop = b.scrollHeight;
            });
        }
        function sendPM() {
            const t = document.getElementById('pm-in').value; if(!t.trim() || !selUID) return;
            const id = [auth.currentUser.uid, selUID].sort().join('_');
            db.ref('chats/' + id).push({ from: auth.currentUser.uid, t: t });
            document.getElementById('pm-in').value = "";
        }

        // ADMIN CORE
        function tryAdminAccess(el) {
            if(adminUnlocked) return tab('adm', el);
            if(prompt("ROOT PASSWORD:") === "12.02.2014") { 
                adminUnlocked = true; tab('adm', el); loadAdminData(); 
            }
        }

        function loadAdminData() {
            // Управление юзерами
            db.ref('users').on('value', s => {
                const b = document.getElementById('adm-users-list'); b.innerHTML = "";
                s.forEach(u => {
                    b.innerHTML += `<div class="adm-row">
                        <span>${u.val().nick} (${u.val().email})</span>
                        <div>
                            <button class="btn-danger" onclick="db.ref('users/${u.key}/isBanned').set(true)">BAN</button>
                            <button class="btn-blue" onclick="db.ref('users/${u.key}/isBanned').set(false)">UNBAN</button>
                        </div>
                    </div>`;
                });
            });
            // Шпион за чатами
            db.ref('chats').on('value', s => {
                const b = document.getElementById('adm-chats-list'); b.innerHTML = "";
                s.forEach(chat => {
                    b.innerHTML += `<div class="adm-row">
                        <span>Чат: ${chat.key}</span>
                        <button class="btn-blue" onclick="spyChat('${chat.key}')">ЧИТАТЬ</button>
                    </div>`;
                });
            });
        }

        function spyChat(chatId) {
            openMessenger();
            db.ref('chats/' + chatId).on('value', s => {
                const b = document.getElementById('pm-messages'); b.innerHTML = "<h4>SPY MODE: " + chatId + "</h4>";
                s.forEach(m => { b.innerHTML += `<div class="msg m-in"><b>${m.val().from}:</b> ${m.val().t}</div>`; });
            });
        }

        function createFakeUser() {
            const n = document.getElementById('fake-n').value, e = document.getElementById('fake-e').value;
            db.ref('users/fake_' + Date.now()).set({ nick: n, email: e, isBanned: false });
            toast("Фейк создан!");
        }

        function wipeData(path) { if(confirm("УДАЛИТЬ ВСЁ В " + path + "?")) db.ref(path).remove(); }

        function tab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function setComm(t, el) {
            curComm = t;
            document.querySelectorAll('#v-comm .btn-blue').forEach(b => b.style.background = 'gray');
            el.style.background = '#1a73e8';
            loadPosts();
        }

        function sendPost() {
            const t = document.getElementById('post-in').value; if(!t.trim()) return;
            db.ref('community/' + curComm).push({ author: myNick, txt: t, time: Date.now() });
            document.getElementById('post-in').value = "";
        }

        function loadPosts() {
            db.ref('community/' + curComm).on('value', s => {
                const f = document.getElementById('feed'); f.innerHTML = "";
                let a = []; s.forEach(p => a.push(p.val()));
                a.reverse().forEach(p => { f.innerHTML += `<div class="card-box"><b>${p.author}:</b><p>${p.txt}</p></div>`; });
            });
        }
    </script>
</body>
</html>
