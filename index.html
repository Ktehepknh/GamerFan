<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesFan OS | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --g-blue: #1a73e8; --g-bg: #ffffff; --g-surface: #f8f9fa;
            --g-border: #dadce0; --g-text: #202124; --g-text-light: #5f6368;
            --orange: #ff8c00; --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --g-bg: #0b0e14; --g-surface: #1c2128; --g-border: #444c56;
            --g-text: #adbac7; --g-text-light: #768390; --g-blue: #539bf5;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        /* AUTH */
        #auth-screen { position: fixed; inset: 0; background: var(--g-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { width: 400px; padding: 40px; border: 1px solid var(--g-border); border-radius: 16px; text-align: center; box-shadow: var(--shadow); background: var(--g-bg); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--g-border); border-radius: 8px; background: var(--g-surface); color: var(--g-text); outline: none; }
        
        /* APP LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: var(--g-surface); border-right: 1px solid var(--g-border); padding: 30px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 14px 30px; cursor: pointer; color: var(--g-text-light); border-radius: 0 30px 30px 0; margin-right: 20px; margin-bottom: 5px; font-weight: 500; transition: 0.2s; }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); border-left: 5px solid var(--g-blue); }

        .main { padding: 40px; overflow-y: auto; position: relative; }
        .view { display: none; }
        .view.active { display: block; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--g-blue); }

        /* PM SYSTEM (REAL PLAYERS) */
        .chat-split { display: grid; grid-template-columns: 200px 1fr; gap: 20px; height: 500px; border: 1px solid var(--g-border); border-radius: 12px; overflow: hidden; }
        .user-list { background: var(--g-surface); border-right: 1px solid var(--g-border); overflow-y: auto; padding: 10px; }
        .u-item { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; font-size: 14px; }
        .u-item:hover { background: #eee; }
        .u-item.active { background: var(--g-blue); color: white; }
        .chat-window { display: flex; flex-direction: column; padding: 15px; background: var(--g-bg); }
        #pm-messages { flex: 1; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; }
        .m-in { background: #eee; align-self: flex-start; }
        .m-out { background: var(--g-blue); color: white; align-self: flex-end; }

        /* OVERLAY */
        #overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        .bar { height: 50px; background: #202124; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }
        
        .nick-orange { color: var(--orange) !important; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-t">Mark-42 Studio</h2>
            <input type="text" id="reg-n" placeholder="Никнейм" class="hidden">
            <input type="email" id="reg-e" placeholder="Email">
            <input type="password" id="reg-p" placeholder="Пароль">
            <button class="btn-blue" style="padding:12px; width:100%; border-radius:8px; border:none; cursor:pointer;" onclick="authFlow()">Продолжить</button>
            <p style="margin-top:15px; font-size:12px; cursor:pointer;" onclick="isLog=!isLog; document.getElementById('reg-n').classList.toggle('hidden')">Вход / Регистрация</p>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding:0 30px 30px; color:var(--g-blue); font-weight:bold; font-size:20px;">GamesFan OS</div>
            <div class="nav-item active" onclick="tab('lib', this)">🎮 Библиотека</div>
            <div class="nav-item" onclick="tab('pms', this)">✉️ Личные сообщения</div>
            <div class="nav-item" onclick="tab('set', this)">⚙️ Настройки</div>
            <div id="cur-u" style="margin-top:auto; padding:20px; border-top:1px solid var(--g-border); font-size:12px;">...</div>
        </aside>

        <main class="main">
            <div id="v-lib" class="view active">
                <h3>Твои Игры</h3><br>
                <div class="grid">
                    <div class="card" onclick="play('Slime_Farm_2D/index.html', 'Slime Farm 2D')">🚜<br><b>Farm 2D</b></div>
                    <div class="card" onclick="play('Slime_Clicker/index.html', 'Slime Clicker')">🦠<br><b>Clicker</b></div>
                </div><br>
                <h3>ELBERR_OS</h3><br>
                <div class="grid">
                    <div class="card" onclick="play('ELBERR_OS/Chapter1/index.html','CH 1')">01</div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter2/index.html','CH 2')">02</div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter3/index.html','CH 3')">03</div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter4/index.html','CH 4')">04</div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter5/index.html','CH 5')">05</div>
                    <div class="card" onclick="play('ELBERR_OS/Chapter6/index.html','CH 6')">06</div>
                </div>
            </div>

            <div id="v-pms" class="view">
                <h3>Сообщения с игроками</h3><br>
                <div class="chat-split">
                    <div class="user-list" id="users-box"></div>
                    <div class="chat-window">
                        <div id="pm-target" style="font-weight:bold; margin-bottom:10px;">Выберите игрока</div>
                        <div id="pm-messages"></div>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="pm-input" placeholder="Сообщение..." style="margin:0;">
                            <button class="btn-blue" style="padding:0 20px; border-radius:8px;" onclick="sendPM()">></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="overlay">
        <div class="bar">
            <span id="game-t">Игра</span>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">ЗАКРЫТЬ</button>
        </div>
        <iframe id="game-f" src="" allow="autoplay"></iframe>
    </div>

    <script>
        const conf = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d"
        };
        firebase.initializeApp(conf);
        const auth = firebase.auth();
        const db = firebase.database();

        let isLog = true, myNick = "", selectedUID = null;

        async function authFlow() {
            const e = document.getElementById('reg-e').value, p = document.getElementById('reg-p').value, n = document.getElementById('reg-n').value;
            try {
                if(isLog) await auth.signInWithEmailAndPassword(e, p);
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({ nick: n, email: e });
                }
            } catch(ex) { alert(ex.message); }
        }

        auth.onAuthStateChanged(u => {
            if(u) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                db.ref('users/' + u.uid).on('value', s => {
                    myNick = (u.email === "vetrovlev1@gmail.com") ? "Creater ktehepknh | Mark-42 Studio" : (s.val()?.nick || "User");
                    document.getElementById('cur-u').innerText = myNick;
                    if(u.email === "vetrovlev1@gmail.com") document.getElementById('cur-u').classList.add('nick-orange');
                });
                loadUsers();
            }
        });

        function loadUsers() {
            db.ref('users').on('value', s => {
                const box = document.getElementById('users-box');
                box.innerHTML = "";
                s.forEach(u => {
                    if(u.key === auth.currentUser.uid) return;
                    let d = document.createElement('div');
                    d.className = 'u-item';
                    d.innerText = u.val().nick;
                    d.onclick = () => selectChat(u.key, u.val().nick);
                    box.appendChild(d);
                });
            });
        }

        function selectChat(uid, nick) {
            selectedUID = uid;
            document.getElementById('pm-target').innerText = "Диалог с: " + nick;
            const chatID = [auth.currentUser.uid, uid].sort().join('_');
            db.ref('chats/' + chatID).on('value', s => {
                const msgBox = document.getElementById('pm-messages');
                msgBox.innerHTML = "";
                s.forEach(m => {
                    let d = document.createElement('div');
                    d.className = 'msg ' + (m.val().from === auth.currentUser.uid ? 'm-out' : 'm-in');
                    d.innerText = m.val().txt;
                    msgBox.appendChild(d);
                });
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        function sendPM() {
            const txt = document.getElementById('pm-input').value;
            if(!txt || !selectedUID) return;
            const chatID = [auth.currentUser.uid, selectedUID].sort().join('_');
            db.ref('chats/' + chatID).push({ from: auth.currentUser.uid, txt: txt, time: Date.now() });
            document.getElementById('pm-input').value = "";
        }

        function play(path, name) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('game-t').innerText = name;
            // ФИКС КАРТИНОК: путь без лишних параметров для корректной работы относительных ссылок в assets
            document.getElementById('game-f').src = path;
        }

        function closeGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-f').src = "";
        }

        function tab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
