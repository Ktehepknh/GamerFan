<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark-42 Studio | Classic Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        /* ТОТ САМЫЙ ПРЕЖНИЙ СТИЛЬ */
        body, html {
            background: #000; color: #ffcc00;
            font-family: "Courier New", Courier, monospace;
            margin: 0; padding: 0; height: 100vh;
            overflow: hidden; box-sizing: border-box;
        }
        
        /* ОКНО ВХОДА */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            border: 1px solid #ffcc00; padding: 20px; width: 280px; text-align: center;
        }
        input, select, button {
            width: 100%; margin: 8px 0; background: #000; border: 1px solid #ffcc00;
            color: #ffcc00; font-family: inherit; padding: 8px; font-size: 13px;
        }
        button:hover { background: #ffcc00; color: #000; cursor: pointer; }

        /* ВЕРХНЯЯ ШАПКА */
        header {
            border-bottom: 1px solid #ffcc00; padding: 10px;
            display: flex; justify-content: space-between; font-weight: bold;
        }

        /* КЛАССИЧЕСКАЯ НАВИГАЦИЯ */
        nav {
            display: flex; border-bottom: 1px solid #ffcc00; background: #000;
        }
        .nav-btn {
            padding: 10px 15px; cursor: pointer; border-right: 1px solid #ffcc00;
            font-size: 12px; text-transform: uppercase;
        }
        .nav-btn.active { background: #ffcc00; color: #000; }

        /* ИГРОВОЕ ПОЛЕ */
        #stage { flex: 1; position: relative; height: calc(100vh - 85px); }
        iframe { width: 100%; height: 100%; border: none; }

        /* ВЫПАДАЮЩИЕ ГЛАВЫ */
        #el-dropdown {
            position: absolute; top: 0; left: 180px; background: #000;
            border: 1px solid #ffcc00; display: none; flex-direction: column; z-index: 500;
        }
        .el-opt { padding: 8px 15px; border-bottom: 1px solid #ffcc00; cursor: pointer; font-size: 12px; }
        .el-opt:hover { background: #111; }

        /* СЛОИ (ЧАТ, ПРОФИЛЬ) */
        .page {
            position: absolute; inset: 0; background: #000; display: none;
            padding: 20px; overflow-y: auto; z-index: 100;
        }

        /* РЕАЛЬНЫЙ МУЛЬТИПЛЕЕРНЫЙ ЧАТ */
        .chat-layout { display: flex; height: 100%; border: 1px solid #ffcc00; }
        .online-list { width: 140px; border-right: 1px solid #ffcc00; padding: 10px; font-size: 11px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        #chat-logs { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .m-line { margin-bottom: 6px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .m-line b { color: #fff; }

        /* АДМИНКА */
        .admin-tag { color: #ff0000; font-size: 10px; border: 1px solid #ff0000; padding: 1px 3px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="margin-bottom:15px;">MARK-42 STUDIO [ROOT]</div>
        <input type="text" id="n-in" placeholder="NICKNAME">
        <input type="email" id="m-in" placeholder="EMAIL">
        <button onclick="doLogin()">INITIALIZE</button>
    </div>
</div>

<header>
    <span>MARK-42 CORE // V.10</span>
    <span id="header-user">ID: NONE</span>
</header>

<nav>
    <div class="nav-btn active" onclick="load('sf', this)">FARM 2D</div>
    <div class="nav-item nav-btn" onclick="load('sc', this)">CLICKER 2D</div>
    <div class="nav-item nav-btn" onclick="toggleEL()">ELBERR_OS</div>
    <div class="nav-item nav-btn" onclick="openPage('chat', this)">REAL CHAT</div>
    <div class="nav-item nav-btn" onclick="openPage('prof', this)">PROFILE</div>
</nav>

<div id="el-dropdown">
    <div class="el-opt" onclick="load('e1')">CHAPTER 1</div>
    <div class="el-opt" onclick="load('e2')">CHAPTER 2</div>
    <div class="el-opt" onclick="load('e3')">CHAPTER 3</div>
    <div class="el-opt" onclick="load('e4')">CHAPTER 4</div>
    <div class="el-opt" onclick="load('e5')">CHAPTER 5</div>
    <div class="el-opt" onclick="load('e6')">CHAPTER 6</div>
</div>

<div id="stage">
    <iframe id="viewport" src=""></iframe>

    <div id="p-chat" class="page">
        <div class="chat-layout">
            <div class="online-list">
                <div style="border-bottom: 1px solid #ffcc00; margin-bottom: 10px;">ONLINE:</div>
                <div id="users-online"></div>
            </div>
            <div class="chat-area">
                <div id="chat-logs"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="msg-input" placeholder="Введите сообщение..." style="margin:0;">
                    <button onclick="sendMsg()" style="width:80px; margin:0;">SEND</button>
                </div>
            </div>
        </div>
    </div>

    <div id="p-prof" class="page">
        <div class="login-box" style="width:100%; text-align:left;">
            <p>USER: <span id="st-n">?</span></p>
            <p>MAIL: <span id="st-m">?</span></p>
            <p>RANK: <span id="st-r">USER</span></p>
            <button onclick="logOut()" style="width:120px;">DISCONNECT</button>
        </div>
    </div>
</div>

<script>
    // Инициализация GunDB (Сетевой мост между игроками)
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const chatDB = gun.get('mark42_chat_final');
    const userStatus = gun.get('mark42_users_online');

    let user = { n: "", m: "", a: false };
    const PATHS = { 
        sf: "Slime_Farm_2D/index.html", sc: "Slime_Clicker/index.html",
        e1: "ELBERR_OS/Chapter1/index.html", e2: "ELBERR_OS/Chapter2/index.html",
        e3: "ELBERR_OS/Chapter3/index.html", e4: "ELBERR_OS/Chapter4/index.html",
        e5: "ELBERR_OS/Chapter5/index.html", e6: "ELBERR_OS/Chapter6/index.html"
    };

    window.onload = () => {
        let data = localStorage.getItem('m42_save');
        if(data) { user = JSON.parse(data); apply(); }
    };

    function doLogin() {
        user.n = document.getElementById('n-in').value;
        user.m = document.getElementById('m-in').value;
        if(!user.n) return;
        user.a = (user.m.toLowerCase() === "vetrovlev1@gmail.com");
        localStorage.setItem('m42_save', JSON.stringify(user));
        apply();
    }

    function apply() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('header-user').innerText = "ID: " + user.n.toUpperCase();
        document.getElementById('st-n').innerText = user.n;
        document.getElementById('st-m').innerText = user.m;
        if(user.a) { document.getElementById('st-r').innerHTML = "SUPER ADMIN <span class='admin-tag'>ROOT</span>"; }
        
        load('sf', document.querySelectorAll('.nav-btn')[0]);
        
        // Входим в сеть
        userStatus.get(user.n).put({ name: user.n, active: Date.now() });
        listenNet();
    }

    function logOut() { localStorage.removeItem('m42_save'); location.reload(); }

    function load(id, b) {
        document.getElementById('viewport').src = PATHS[id];
        hideAll(); document.getElementById('el-dropdown').style.display = 'none';
        if(b) active(b);
    }

    function toggleEL() {
        let d = document.getElementById('el-dropdown');
        d.style.display = (d.style.display==='flex')?'none':'flex';
    }

    function openPage(id, b) { hideAll(); document.getElementById('p-'+id).style.display='block'; active(b); }
    function hideAll() { document.querySelectorAll('.page').forEach(p => p.style.display='none'); }
    function active(b) { document.querySelectorAll('.nav-btn').forEach(i => i.classList.remove('active')); b.classList.add('active'); }

    // --- СЕТЕВАЯ ЛОГИКА ---
    function sendMsg() {
        let inp = document.getElementById('msg-input');
        if(!inp.value) return;
        chatDB.set({ sender: user.n, msg: inp.value, timestamp: Date.now() });
        inp.value = "";
    }

    function listenNet() {
        // Слушаем сообщения
        chatDB.map().once((data) => {
            if(!data || !data.msg) return;
            let logs = document.getElementById('chat-logs');
            let div = document.createElement('div');
            div.className = 'm-line';
            div.innerHTML = `<b>${data.sender}:</b> ${data.msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        });

        // Слушаем игроков онлайн
        userStatus.map().on((data) => {
            if(!data || !data.name) return;
            if(Date.now() - data.active < 120000) { // Если был в сети последние 2 мин
                let list = document.getElementById('users-online');
                if(!document.getElementById('online-'+data.name)) {
                    let uDiv = document.createElement('div');
                    uDiv.id = 'online-'+data.name;
                    uDiv.innerText = "> " + data.name;
                    uDiv.style.marginBottom = "5px";
                    list.appendChild(uDiv);
                }
            }
        });
        
        // Пинг присутствия
        setInterval(() => { userStatus.get(user.n).put({ name: user.n, active: Date.now() }); }, 60000);
    }
</script>
</body>
</html>
