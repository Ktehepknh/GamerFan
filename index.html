<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mark-42 Studio | Social Portal</title>
    <style>
        :root { --accent: #ffcc00; --bg: #0b0b0f; --panel: #15151f; --admin-red: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* AUTH MODAL */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }

        /* NAV */
        #top-nav { height: 65px; background: #000; border-bottom: 3px solid var(--accent); display: flex; align-items: center; padding: 0 15px; z-index: 2000; position: relative; }
        .nav-scroll { display: flex; gap: 8px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .nav-btn { white-space: nowrap; cursor: pointer; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; background: rgba(255,255,255,0.05); }
        .nav-btn.active { background: var(--accent); color: #000; }

        /* LAYERS */
        .layer { position: absolute; inset: 0; background: var(--bg); display: none; overflow-y: auto; padding: 20px; z-index: 1500; }
        
        /* COMMUNITY */
        .post { background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .post b { color: var(--accent); font-size: 14px; }
        .post-tools { position: absolute; top: 10px; right: 10px; }
        .del-btn { background: var(--admin-red); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        /* MESSENGER */
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .contact-card { background: var(--panel); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-friend { background: #222; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* CHAT WINDOW */
        #chat-ui { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
        #chat-log { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; font-size: 14px; }
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; }
        .msg.them { background: #1a1a24; color: #fff; align-self: flex-start; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:var(--accent)">MARK-42 LOGIN</h2>
        <input type="text" id="user-nick" placeholder="Ваш ник (например: Lev)">
        <input type="email" id="user-email" placeholder="Почта (Vetrovlev1@gmail.com)">
        <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); border:none; font-weight:bold; border-radius:8px; margin-top:10px;">ВОЙТИ</button>
    </div>
</div>

<nav id="top-nav">
    <div class="nav-scroll">
        <div class="nav-btn active" onclick="go('sf', this)">Farm 2D</div>
        <div class="nav-btn" onclick="go('sc', this)">Clicker</div>
        <div class="nav-btn" onclick="openLayer('comm', this)">Сообщество</div>
        <div class="nav-btn" onclick="openLayer('msgs', this)">Друзья / ЛС</div>
    </div>
</nav>

<div id="main-stage" style="width:100%; height:calc(100vh - 65px);">
    <iframe id="view" src="" style="width:100%; height:100%; border:none;"></iframe>

    <div id="comm-layer" class="layer">
        <div style="margin-bottom:20px;">
            <textarea id="post-input" placeholder="Че нового?.." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:10px; border-radius:10px;"></textarea>
            <button onclick="addPost()" style="margin-top:10px; background:var(--accent); border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">Запостить</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="msgs-layer" class="layer">
        <div class="search-bar">
            <input type="text" id="search-nick" placeholder="Ник игрока..." style="margin:0;">
            <button onclick="findPlayer()" style="background:var(--accent); color:#000; border:none; padding:0 15px; border-radius:8px; font-weight:bold;">Найти</button>
        </div>
        <div id="contacts-list">
            <h3 style="color:#555">Мои контакты</h3>
            <div class="contact-card">
                <div><b>Виктор (Помощник)</b><br><small style="color:var(--accent)">в сети</small></div>
                <button class="btn-friend" onclick="chatWith('Виктор')">Написать</button>
            </div>
        </div>
    </div>
</div>

<div id="chat-ui">
    <div style="padding:20px; background:var(--accent); color:#000; font-weight:bold; display:flex; justify-content:space-between;">
        <span onclick="document.getElementById('chat-ui').style.display='none'" style="cursor:pointer">← Назад</span>
        <span id="chat-title">Игрок</span>
        <span></span>
    </div>
    <div id="chat-log"></div>
    <div style="padding:15px; background:#111; display:flex; gap:10px;">
        <input type="text" id="msg-input" placeholder="Пиши сюда..." style="margin:0;">
        <button onclick="sendMsg()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:8px; font-weight:bold;">></button>
    </div>
</div>

<script>
    let currentUser = { nick: "", email: "", isAdmin: false };
    const PATHS = { sf: "Slime_Farm_2D/index.html", sc: "Slime_Clicker/index.html" };

    function login() {
        const nick = document.getElementById('user-nick').value;
        const email = document.getElementById('user-email').value;
        if(!nick || !email) return alert("Заполни данные!");

        currentUser.nick = nick;
        currentUser.email = email;
        if(email === "Vetrovlev1@gmail.com") currentUser.isAdmin = true;

        document.getElementById('auth-screen').style.display = 'none';
        go('sf', document.querySelectorAll('.nav-btn')[0]);
        loadInitialPosts();
    }

    function go(id, btn) {
        document.getElementById('view').src = PATHS[id];
        closeLayers();
        setActive(btn);
    }

    function openLayer(id, btn) {
        closeLayers();
        document.getElementById(id + '-layer').style.display = 'block';
        setActive(btn);
    }

    function closeLayers() { document.querySelectorAll('.layer').forEach(l => l.style.display = 'none'); }
    function setActive(btn) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    // --- СООБЩЕСТВО ---
    let posts = [
        {id: 1, author: "Виктор", text: "Лев, я проверил Slime_Clicker, папка на месте! Игроки уже вовсю кликают."},
        {id: 2, author: "User_42", text: "Офигеть, 6-я глава ELBERR это просто нечто! Концовка до мурашек."}
    ];

    function loadInitialPosts() {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        posts.forEach(p => {
            const div = document.createElement('div');
            div.className = 'post';
            div.innerHTML = `
                <div class="post-tools">${currentUser.isAdmin ? `<button class="del-btn" onclick="deletePost(${p.id})">Удалить</button>` : ''}</div>
                <b>${p.author}</b><br>
                <span>${p.text}</span>
            `;
            feed.prepend(div);
        });
    }

    function addPost() {
        const text = document.getElementById('post-input').value;
        if(!text) return;
        const newPost = { id: Date.now(), author: currentUser.nick, text: text };
        posts.push(newPost);
        document.getElementById('post-input').value = "";
        loadInitialPosts();
    }

    function deletePost(id) {
        posts = posts.filter(p => p.id !== id);
        loadInitialPosts();
    }

    // --- МЕССЕНДЖЕР ---
    function findPlayer() {
        const nick = document.getElementById('search-nick').value;
        if(!nick) return;
        const list = document.getElementById('contacts-list');
        const card = document.createElement('div');
        card.className = 'contact-card';
        card.innerHTML = `
            <div><b>${nick}</b><br><small style="color:#555">не в сети</small></div>
            <div style="display:flex; gap:5px;">
                <button class="btn-friend" onclick="alert('Запрос отправлен!')">В друзья</button>
                <button class="btn-friend" onclick="chatWith('${nick}')">ЛС</button>
            </div>
        `;
        list.prepend(card);
    }

    function chatWith(name) {
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-title').innerText = name;
        const log = document.getElementById('chat-log');
        log.innerHTML = `<div class="msg them">Привет, ${currentUser.nick}! Как жизнь? Видел обнову на Slime Farm?</div>`;
    }

    function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="msg me">${inp.value}</div>`;
        
        const target = document.getElementById('chat-title').innerText;
        setTimeout(() => {
            let reply = "Ахах, реально? Ну ты даешь!";
            if(target === "Виктор") reply = "Лев, я на связи. Слушаю твои указания по Mark-42 Studio!";
            if(inp.value.toLowerCase().includes("дела")) reply = "Да ваще по кайфу всё, сижу в ELBERR гамаю.";
            
            log.innerHTML += `<div class="msg them">${reply}</div>`;
            log.scrollTop = log.scrollHeight;
        }, 1000);
        
        inp.value = "";
        log.scrollTop = log.scrollHeight;
    }
</script>
</body>
</html>
