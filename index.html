<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesFan OS | Mark-42 Studio</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --g-blue: #1a73e8;
            --g-bg: #ffffff;
            --g-surface: #f8f9fa;
            --g-border: #dadce0;
            --g-text: #202124;
            --g-text-light: #5f6368;
            --orange: #ff8c00;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --g-bg: #0b0e14;
            --g-surface: #1c2128;
            --g-border: #444c56;
            --g-text: #adbac7;
            --g-text-light: #768390;
            --g-blue: #539bf5;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body, html { height: 100%; background: var(--g-bg); color: var(--g-text); overflow: hidden; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--g-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { 
            width: 400px; padding: 40px; border: 1px solid var(--g-border); 
            border-radius: 16px; text-align: center; box-shadow: var(--shadow);
            background: var(--g-bg);
        }
        .auth-card h2 { font-family: 'Montserrat', sans-serif; margin-bottom: 20px; color: var(--g-blue); }
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--g-border); 
            border-radius: 8px; background: var(--g-surface); color: var(--g-text); outline: none; 
            transition: var(--transition);
        }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: var(--transition); }
        .btn-blue { background: var(--g-blue); color: white; width: 100%; margin-top: 10px; }
        .btn-ghost { background: transparent; color: var(--g-text-light); margin-top: 10px; font-size: 13px; }

        /* MAIN APP */
        #app { display: none; height: 100vh; grid-template-rows: auto 1fr; }
        .app-container { display: grid; grid-template-columns: 280px 1fr; height: 100%; }

        /* SIDEBAR */
        .sidebar { background: var(--g-surface); border-right: 1px solid var(--g-border); padding: 30px 0; display: flex; flex-direction: column; }
        .nav-item { 
            padding: 14px 30px; cursor: pointer; color: var(--g-text-light); font-size: 15px; 
            border-radius: 0 30px 30px 0; margin-right: 20px; margin-bottom: 8px; font-weight: 500;
        }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); border-left: 5px solid var(--g-blue); }

        /* MAIN CONTENT */
        .main { padding: 40px; overflow-y: auto; background: var(--g-bg); }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .game-card { 
            background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 16px; 
            padding: 25px; text-align: center; cursor: pointer; transition: var(--transition);
        }
        .game-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--g-blue); }

        /* CHAT / POSTS */
        .post { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .nick-orange { color: var(--orange) !important; font-weight: 900 !important; }

        /* GAME OVERLAY */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        .game-bar { height: 50px; background: #202124; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }
        iframe { flex-grow: 1; border: none; background: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="auth-title">Mark-42 OS</h2>
            <input type="text" id="reg-nick" placeholder="Имя профиля" class="hidden">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn btn-blue" onclick="processAuth()" id="main-auth-btn">Войти</button>
            <p id="toggle-txt" style="font-size:12px; color:var(--g-text-light); cursor:pointer; margin-top:20px;" onclick="toggleAuthMode()">Нет аккаунта? Создать</p>
        </div>
    </div>

    <div id="app">
        <div class="app-container">
            <aside class="sidebar">
                <div style="padding: 0 30px 40px; font-family:'Montserrat'; font-weight: 700; color: var(--g-blue); font-size: 22px;">Mark-42 Studio</div>
                <div class="nav-item active" onclick="switchTab('games', this)">🎮 Библиотека</div>
                <div class="nav-item" onclick="switchTab('social', this)">🌍 Чат / Лента</div>
                <div class="nav-item" onclick="switchTab('settings', this)">⚙️ Настройки</div>
                <div id="admin-nav" class="nav-item hidden" onclick="switchTab('admin', this)" style="color:#d93025; font-weight:bold;">⚡ Админ</div>
                
                <div style="margin-top: auto; padding: 30px; border-top: 1px solid var(--g-border);">
                    <div id="user-status" style="font-weight: bold; font-size: 14px;">Загрузка...</div>
                </div>
            </aside>

            <main class="main">
                <div id="view-games" class="view active">
                    <h1>Все игры</h1>
                    <div class="grid">
                        <div class="game-card" onclick="launchGame('Slime_Farm_2D/index.html', 'Slime Farm 2D')">
                            <span style="font-size:40px;">🚜</span><br><b>Slime Farm 2D</b>
                        </div>
                        <div class="game-card" onclick="launchGame('Slime_Clicker/index.html', 'Slime Clicker 2D')">
                            <span style="font-size:40px;">🦠</span><br><b>Slime Clicker 2D</b>
                        </div>
                        <div class="game-card" onclick="launchGame('ELBERR_OS/Chapter1/index.html', 'ELBERR OS: Глава 1')">
                            <span style="font-size:40px;">💾</span><br><b>ELBERR: Ch. 1</b>
                        </div>
                        <div class="game-card" onclick="launchGame('ELBERR_OS/Chapter5/index.html', 'ELBERR OS: Глава 5')">
                            <span style="font-size:40px;">🧠</span><br><b>ELBERR: Ch. 5</b>
                        </div>
                    </div>
                </div>

                <div id="view-social" class="view">
                    <h1>Мировой чат</h1>
                    <div class="post">
                        <textarea id="post-input" placeholder="Введите сообщение..." style="width:100%; border:none; outline:none; background:transparent; resize:none; font-size:16px;"></textarea>
                        <button class="btn btn-blue" style="width:auto; float:right;" onclick="sendPost()">Отправить</button>
                        <div style="clear:both"></div>
                    </div>
                    <div id="feed-container"></div>
                </div>

                <div id="view-settings" class="view">
                    <h1>Настройки</h1>
                    <div class="post">
                        <h3>Тема оформления</h3>
                        <button class="btn" onclick="applyTheme('light')">☀️ Светлая</button>
                        <button class="btn" onclick="applyTheme('dark')" style="background:#222; color:white">🌙 Темная</button>
                    </div>
                    <button class="btn btn-ghost" onclick="auth.signOut()" style="color:#d93025">ВЫЙТИ</button>
                </div>
            </main>
        </div>
    </div>

    <div id="game-overlay">
        <div class="game-bar">
            <span id="game-title-text">Игра</span>
            <button class="btn" style="background:#d93025; color:white; padding:5px 10px;" onclick="closeGame()">ЗАКРЫТЬ ✖</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        // КОНФИГУРАЦИЯ ИЗ ТВОЕГО ФАЙЛА
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isLoginMode = true;
        let userNick = "Игрок";

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Вход" : "Регистрация";
            document.getElementById('reg-nick').classList.toggle('hidden', isLoginMode);
            document.getElementById('main-auth-btn').innerText = isLoginMode ? "Войти" : "Создать";
        }

        async function processAuth() {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            const n = document.getElementById('reg-nick').value;
            try {
                if(isLoginMode) await auth.signInWithEmailAndPassword(e, p);
                else {
                    const r = await auth.createUserWithEmailAndPassword(e, p);
                    await db.ref('users/' + r.user.uid).set({ nick: n });
                }
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                if(user.email === "vetrovlev1@gmail.com") document.getElementById('admin-nav').classList.remove('hidden');

                db.ref('users/' + user.uid).on('value', s => {
                    userNick = (user.email === "vetrovlev1@gmail.com") ? "Creater ktehepknh | Mark-42 Studio" : (s.val()?.nick || "Игрок");
                    const st = document.getElementById('user-status');
                    st.innerText = userNick;
                    if(user.email === "vetrovlev1@gmail.com") st.className = 'nick-orange';
                });
                loadPosts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        function sendPost() {
            const txt = document.getElementById('post-input').value;
            if(!txt.trim()) return;
            db.ref('posts').push({
                author: userNick,
                text: txt,
                isCreator: (auth.currentUser.email === "vetrovlev1@gmail.com"),
                time: Date.now()
            });
            document.getElementById('post-input').value = "";
        }

        function loadPosts() {
            db.ref('posts').limitToLast(50).on('value', s => {
                const feed = document.getElementById('feed-container');
                feed.innerHTML = "";
                let arr = [];
                s.forEach(c => { arr.push(c.val()); });
                arr.reverse().forEach(p => {
                    feed.innerHTML += `
                        <div class="post">
                            <b class="${p.isCreator ? 'nick-orange' : ''}">${p.author}</b>
                            <p style="margin-top:5px;">${p.text}</p>
                        </div>`;
                });
            });
        }

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function launchGame(path, title) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title-text').innerText = title;
            document.getElementById('game-frame').src = path;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }

        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
        }
    </script>
</body>
</html>
