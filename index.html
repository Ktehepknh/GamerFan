<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark-42 Studio | GamesFan OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --g-blue: #1a73e8; --g-bg: #ffffff; --g-surface: #f8f9fa; --g-border: #dadce0;
            --g-text: #202124; --orange: #ff8c00; --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --g-bg: #0b0e14; --g-surface: #1c2128; --g-border: #444c56; --g-text: #adbac7; --g-blue: #539bf5;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body { background: var(--g-bg); color: var(--g-text); height: 100vh; overflow: hidden; }

        /* LAYOUT */
        #app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        .sidebar { background: var(--g-surface); border-right: 1px solid var(--g-border); padding: 25px 0; display: flex; flex-direction: column; }
        .nav-item { padding: 12px 30px; cursor: pointer; color: var(--g-text); font-size: 15px; margin-bottom: 5px; border-radius: 0 25px 25px 0; margin-right: 15px; }
        .nav-item.active { background: #e8f0fe; color: var(--g-blue); font-weight: bold; border-left: 4px solid var(--g-blue); }
        [data-theme="dark"] .nav-item.active { background: #2d333b; }

        .main { padding: 40px; overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        /* POSTS UI */
        .post { background: var(--g-surface); border: 1px solid var(--g-border); border-radius: 10px; padding: 20px; margin-bottom: 15px; position: relative; }
        .post-tools { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .btn-tool { background: none; border: 1px solid var(--g-border); border-radius: 4px; cursor: pointer; color: var(--g-text-light); padding: 2px 6px; font-size: 11px; }
        .nick-orange { color: var(--orange) !important; font-weight: 900 !important; }

        /* SAVE EDITOR (ADMIN) */
        #admin-save-area { width: 100%; height: 200px; background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background: var(--g-bg); border: 1px solid var(--g-border); border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--g-blue); box-shadow: var(--shadow); }

        /* OVERLAY */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; }
        .game-bar { height: 45px; background: #202124; display: flex; align-items: center; padding: 0 15px; color: white; justify-content: space-between; }
        iframe { flex-grow: 1; border: none; background: white; }

        .hidden { display: none !important; }
        .btn-blue { background: var(--g-blue); color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--g-bg); display:flex; align-items:center; justify-content:center; z-index:5000;">
        <div class="auth-card" style="width:380px; padding:40px; border:1px solid var(--g-border); border-radius:12px; text-align:center;">
            <h2 style="font-family:'Montserrat'; margin-bottom:20px;">Mark-42 OS</h2>
            <input type="email" id="reg-email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px;">
            <input type="password" id="reg-pass" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:10px;">
            <button class="btn-blue" onclick="processAuth()" style="width:100%;">Войти</button>
            <button onclick="loginAsGuest()" style="margin-top:15px; background:none; border:none; color:var(--g-blue); cursor:pointer;">Войти как гость</button>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div style="padding: 0 30px 30px; font-family:'Montserrat'; font-size:20px; color:var(--g-blue)">Mark-42 Studio</div>
            <div class="nav-item active" onclick="switchTab('games', this)">🎮 Библиотека</div>
            <div class="nav-item" onclick="switchTab('social', this)">🌍 Сообщество</div>
            <div class="nav-item" onclick="switchTab('settings', this)">⚙️ Настройки</div>
            <div class="nav-item hidden" id="admin-nav" onclick="switchTab('admin', this)" style="color:red; font-weight:bold;">⚡ Админ-Панель</div>
            
            <div style="margin-top:auto; padding:20px; font-size:13px; border-top:1px solid var(--g-border)">
                Профиль: <span id="user-status">...</span>
            </div>
        </aside>

        <main class="main">
            <div id="view-games" class="view active">
                <h1 style="margin-bottom:25px; font-family:'Montserrat'">Библиотека</h1>
                <div class="grid">
                    <div class="game-card" onclick="launchGame('Slime_Clicker/index.html', 'Slime Clicker 2D')">
                        <div style="font-size:40px">🟢</div><b>Slime Clicker 2D</b>
                    </div>
                </div>
            </div>

            <div id="view-social" class="view">
                <h1 style="margin-bottom:20px;">Лента Mark-42</h1>
                <div class="post">
                    <textarea id="post-input" placeholder="Опубликуйте новость..." style="width:100%; border:none; background:transparent; outline:none; color:var(--g-text); resize:none; height:60px;"></textarea>
                    <button class="btn-blue" style="float:right" onclick="sendPost()">Пост</button>
                    <div style="clear:both"></div>
                </div>
                <div id="feed-container"></div>
            </div>

            <div id="view-settings" class="view">
                <h1>Настройки системы</h1>
                <button class="btn-blue" onclick="auth.signOut()" style="background:#d93025; margin-top:20px;">Выйти из аккаунта</button>
            </div>

            <div id="view-admin" class="view">
                <h1 style="color:red; font-family:'Montserrat'">Панель Разработчика</h1>
                <div class="post" style="border-color:red">
                    <h3>🛠 Редактор сохранений (Slime Clicker)</h3>
                    <p style="font-size:12px; margin-bottom:10px;">Здесь можно вручную изменить JSON сохранения игрока:</p>
                    <textarea id="admin-save-area"></textarea>
                    <button class="btn-blue" onclick="loadSaveFromLocal()">Загрузить из браузера</button>
                    <button class="btn-blue" onclick="saveToLocal()" style="background:green">Сохранить изменения</button>
                </div>
            </div>
        </main>
    </div>

    <div id="game-overlay">
        <div class="game-bar">
            <span id="game-title-text">Загрузка...</span>
            <button onclick="closeGame()" style="background:red; color:white; border:none; padding:5px 10px; cursor:pointer;">Закрыть ✖</button>
        </div>
        <iframe id="game-frame"></iframe>
    </div>

    <script>
        // Инициализация (данные из твоего файла)
        const firebaseConfig = {
            apiKey: "AIzaSyDnniEB9asHQFUl0wwZvkxXpmDi9l_lYAI",
            authDomain: "gamesfan-17986.firebaseapp.com",
            projectId: "gamesfan-17986",
            databaseURL: "https://gamesfan-17986-default-rtdb.firebaseio.com/",
            appId: "1:311654524584:web:9283eea0aea6f7b946849d"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let isAdmin = false;

        // AUTH
        async function processAuth() {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }

        async function loginAsGuest() { await auth.signInAnonymously(); }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                isAdmin = (user.email === "vetrovlev1@gmail.com");
                
                if(isAdmin) document.getElementById('admin-nav').classList.remove('hidden');
                
                db.ref('users/' + user.uid).on('value', s => {
                    let name = isAdmin ? "Creater ktehepknh | Mark-42 Studio" : (s.val()?.nick || "Гость");
                    document.getElementById('user-status').innerText = name;
                    if(isAdmin) document.getElementById('user-status').className = 'nick-orange';
                });
                loadPosts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // SOCIAL LOGIC
        function sendPost() {
            const t = document.getElementById('post-input').value;
            if(!t) return;
            db.ref('posts').push({
                author: isAdmin ? "Creater ktehepknh | Mark-42 Studio" : "Игрок",
                text: t,
                uid: auth.currentUser.uid,
                isCreator: isAdmin,
                time: Date.now()
            });
            document.getElementById('post-input').value = "";
        }

        function loadPosts() {
            db.ref('posts').on('value', s => {
                const f = document.getElementById('feed-container');
                f.innerHTML = "";
                s.forEach(child => {
                    const p = child.val();
                    const key = child.key;
                    const isMyPost = (p.uid === auth.currentUser.uid);
                    
                    let tools = `<div class="post-tools">`;
                    if(isMyPost) tools += `<button class="btn-tool" onclick="editPost('${key}', '${p.text}')">Изменить</button>`;
                    if(isAdmin || isMyPost) tools += `<button class="btn-tool" style="color:red" onclick="db.ref('posts/${key}').remove()">Удалить</button>`;
                    tools += `</div>`;

                    f.innerHTML = `
                        <div class="post">
                            <b class="${p.isCreator ? 'nick-orange' : ''}">${p.author}</b>
                            ${tools}
                            <div style="margin-top:10px;">${p.text}</div>
                        </div>
                    ` + f.innerHTML;
                });
            });
        }

        function editPost(key, oldText) {
            const next = prompt("Изменить текст поста:", oldText);
            if(next) db.ref('posts/' + key).update({ text: next });
        }

        // ADMIN SAVE EDITOR
        function loadSaveFromLocal() {
            const data = localStorage.getItem('m42_slime_save');
            document.getElementById('admin-save-area').value = data || "Сохранение не найдено";
        }

        function saveToLocal() {
            const data = document.getElementById('admin-save-area').value;
            try {
                JSON.parse(data); // Проверка на ошибки
                localStorage.setItem('m42_slime_save', data);
                alert("Данные сохранены! Перезапустите игру для применения.");
            } catch(e) { alert("Ошибка в JSON!"); }
        }

        // SYSTEM
        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function launchGame(path, title) {
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-title-text').innerText = title;
            document.getElementById('game-frame').src = path;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = "";
        }
    </script>
</body>
</html>
