<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Farm 2 | Mark-42 Studio</title>
    <style>
        :root { 
            --accent: #ffcc00; --diam: #00f2ff; --panel: rgba(15, 15, 20, 0.98); 
            --border: rgba(255, 255, 255, 0.1); --bg-color: #000;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; user-select: none; outline: none; touch-action: manipulation; }
        body { margin: 0; background: var(--bg-color); color: white; overflow: hidden; height: 100vh; }
        
        /* HD ГРАФИКА */
        body.hd-on .paddock { box-shadow: inset 0 0 25px rgba(255,204,0,0.05); border-color: rgba(255,204,0,0.3); }
        body.hd-on .slime-img { filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6)); }

        #bg { position: fixed; inset: 0; background: url('assets/background.jpg') center/cover; filter: brightness(0.15); z-index: 1; }
        #app { position: relative; z-index: 10; display: flex; height: 100vh; width: 100vw; }
        
        #main { flex: 1; display: flex; flex-direction: column; padding: 15px; }
        #hud { display: flex; gap: 12px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 22px; border: 1px solid var(--border); align-items: center; margin-bottom: 10px; backdrop-filter: blur(15px); }
        
        .stat { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .res-img { width: 22px; height: 22px; object-fit: contain; }
        .res-img-s { width: 15px; height: 15px; vertical-align: middle; }

        #grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); gap: 12px; flex: 1; }
        .paddock { background: rgba(255,255,255,0.02); border: 2px solid var(--border); border-radius: 28px; position: relative; cursor: pointer; }
        .slime-img { position: absolute; width: 44px; height: 44px; pointer-events: none; transform: translate(-50%, -50%); transition: 0.2s; }

        #side { width: 400px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(25px); }
        .tabs { display: flex; background: rgba(0,0,0,0.4); }
        .tab { flex: 1; padding: 18px 5px; text-align: center; cursor: pointer; font-size: 10px; font-weight: bold; color: #555; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab img { width: 22px; height: 22px; filter: grayscale(1); opacity: 0.4; }
        .tab.active { color: var(--accent); background: rgba(255,204,0,0.03); border-bottom: 2px solid var(--accent); }
        .tab.active img { filter: grayscale(0); opacity: 1; }

        .list { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 14px; font-weight: 900; cursor: pointer; font-size: 11px; width: 100%; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn:disabled { opacity: 0.2; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { width: 340px; background: #0a0a0a; padding: 30px; border-radius: 32px; border: 2px solid var(--accent); }
        .code-input { width: 100%; padding: 14px; background: #151515; border: 1px solid #333; color: var(--accent); border-radius: 12px; margin-top: 10px; text-align: center; }

        /* СПЕЦ КНОПКИ */
        .fs-btn { width: 42px; background: #1a1a1a; color: #fff; font-size: 10px; border-radius: 12px; height: 42px; border: 1px solid #333; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body class="hd-on">

<div id="bg"></div>

<div id="modal-settings" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent); margin-top:0; text-align:center;">ОПЦИИ</h2>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <div style="display:flex; justify-content:space-between;"><span>МУЗЫКА</span><input type="checkbox" id="set-music" onchange="applySett()"></div>
            <div style="display:flex; justify-content:space-between;"><span>ЗВУКИ</span><input type="checkbox" id="set-sfx" checked onchange="applySett()"></div>
            <div style="display:flex; justify-content:space-between;"><span>HD ГРАФИКА</span><input type="checkbox" id="set-hd" checked onchange="applySett()"></div>
        </div>
        
        <div style="margin-top:20px; border-top: 1px solid #222; padding-top:20px;">
            <input type="text" id="promo-code" class="code-input" placeholder="ПРОМОКОД">
            <button class="btn" style="margin-top:10px;" onclick="claimCode()">ПРИМЕНИТЬ</button>
        </div>

        <button class="btn" style="background:#333; color:white; margin-top:30px;" onclick="closeSett()">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="modal-admin" class="modal">
    <div class="modal-content" style="border-color:#ff0055;">
        <h2 style="color:#ff0055; margin-top:0; text-align:center;">ADMIN PANEL</h2>
        <div style="font-size:11px; color:#888;">МОНЕТЫ:<input type="number" id="adm-coins" class="code-input"></div>
        <div style="font-size:11px; color:#888; margin-top:10px;">АЛМАЗЫ:<input type="number" id="adm-diams" class="code-input"></div>
        <div style="font-size:11px; color:#888; margin-top:10px;">МНОЖИТЕЛЬ ЦЕН:<input type="number" id="adm-price" step="0.1" class="code-input"></div>
        <button class="btn" style="background:#ff0055; color:white; margin-top:20px;" onclick="applyAdmin()">ОБНОВИТЬ</button>
        <button class="btn" style="background:#222; color:white; margin-top:10px;" onclick="closeAdmin()">ВЫХОД</button>
    </div>
</div>

<div id="app">
    <div id="main">
        <div id="hud">
            <div class="stat"><img src="assets/coin.png" class="res-img"><span id="c-val">0</span></div>
            <div class="stat"><img src="assets/diamond.png" class="res-img"><span id="d-val">0</span></div>
            <button id="v-btn" class="btn" style="width:110px; background:linear-gradient(45deg, #8e44ad, #2980b9); color:white;" onclick="vipClick()">VIP СБОР</button>
            
            <div style="margin-left:auto; display:flex; gap:8px;">
                <button class="fs-btn" onclick="toggleFS()" title="Полный экран">FS</button>
                <button class="fs-btn" onclick="openSett()">⚙</button>
            </div>
        </div>
        
        <div id="grid"></div>

        <div style="display:flex; justify-content:center; gap:10px; margin-top:12px;">
            <button class="btn" style="width:55px; background:#111; color:white;" onclick="setPage(0)">1</button>
            <button class="btn" style="width:55px; background:#111; color:white;" onclick="setPage(1)">2</button>
            <button class="btn" style="width:55px; background:#111; color:white;" onclick="setPage(2)">3</button>
            <button class="btn" style="width:55px; background:#111; color:white;" onclick="setPage(3)">4</button>
        </div>
    </div>

    <aside id="side">
        <div class="tabs">
            <div class="tab active" id="t-s" onclick="openTab('s')"><img src="assets/slime11.png">МАРКЕТ</div>
            <div class="tab" id="t-v" onclick="openTab('v')"><img src="assets/diamond.png">VIP</div>
            <div class="tab" id="t-u" onclick="openTab('u')"><img src="assets/up.png" onerror="this.src='assets/coin.png'">РАНГИ</div>
            <div class="tab" id="t-q" onclick="openTab('q')"><img src="assets/quest.png" onerror="this.src='assets/diamond.png'">КВЕСТЫ</div>
        </div>
        <div id="list-s" class="list"></div>
        <div id="list-v" class="list" style="display:none"></div>
        <div id="list-u" class="list" style="display:none"></div>
        <div id="list-q" class="list" style="display:none"></div>
    </aside>
</div>

<audio id="s-click" src="assets/click.mp3"></audio>
<audio id="s-music" src="assets/music.mp3" loop></audio>

<script>
    const RANKS = [
        {n:"Медный", c:"#cd7f32", m:1}, {n:"Серебряный", c:"#bdc3c7", m:5},
        {n:"Золотой", c:"#ffcc00", m:25}, {n:"Алмазный", c:"#00f2ff", m:100},
        {n:"Эмеральдовый", c:"#2ecc71", m:500}, {n:"Рубиновый", c:"#e74c3c", m:2500},
        {n:"Обсидиановый", c:"#34495e", m:10000}, {n:"Мифический", c:"#9b59b6", m:50000}
    ];

    const DIAM_IDS = [30, 27, 26, 22, 21, 20, 19, 18, 17, 16];
    let lastClick = 0;

    let game = {
        coins: 200, diams: 0, rank: 0, page: 0, clicks: 0,
        inv: new Array(33).fill(0),
        capacity: 8, isVip: false, usedCodes: [],
        settings: { music: false, sfx: true, hd: true },
        adminPriceMult: 1.0
    };

    const toEven = (n) => Math.ceil(n / 2) * 2;
    function fNum(n) {
        if (n < 1000) return Math.floor(n);
        const s = ['', 'K', 'M', 'B', 'T', 'Q'];
        const i = Math.floor(Math.log10(n) / 3);
        return (n / Math.pow(1000, i)).toFixed(1).replace(/\.0$/, '') + s[i];
    }

    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        } else {
            document.exitFullscreen();
        }
    }

    function init() {
        let saved = localStorage.getItem('m42_sf2_fs_v1');
        if(saved) game = JSON.parse(saved);
        applySett();
        render();
    }

    function render() {
        document.getElementById('c-val').innerText = fNum(game.coins);
        document.getElementById('d-val').innerText = fNum(game.diams);
        const vBtn = document.getElementById('v-btn');
        vBtn.style.filter = game.isVip ? 'none' : 'grayscale(1) opacity(0.5)';
        renderGrid(); renderShop(); renderVipShop(); renderUpgrades(); renderQuests();
        localStorage.setItem('m42_sf2_fs_v1', JSON.stringify(game));
    }

    function renderGrid() {
        const g = document.getElementById('grid'); g.innerHTML = "";
        let start = game.page * 8 + 1;
        const pos = [{x:30,y:30},{x:70,y:30},{x:30,y:70},{x:70,y:70},{x:50,y:50},{x:50,y:20},{x:20,y:50},{x:80,y:50}];
        for(let i=0; i<8; i++) {
            let id = start + i; if(id > 32) break;
            let p = document.createElement('div'); p.className = 'paddock';
            let count = game.inv[id];
            p.onclick = () => {
                let now = Date.now();
                if(now - lastClick < 50) return; lastClick = now;
                if(game.inv[id] > 0) {
                    game.coins += toEven(id * count * RANKS[game.rank].m);
                    game.clicks++;
                    if(game.settings.sfx) { let a = document.getElementById('s-click'); a.currentTime = 0; a.play(); }
                    render();
                }
            };
            for(let j=0; j < Math.min(count, 8); j++) {
                let s = document.createElement('img'); s.className = 'slime-img';
                s.src = `assets/slime${id}.png`;
                s.onerror = () => s.src = 'https://cdn-icons-png.flaticon.com/512/825/825561.png';
                s.style.left = pos[j].x + "%"; s.style.top = pos[j].y + "%";
                p.appendChild(s);
            }
            g.appendChild(p);
        }
    }

    function renderShop() {
        let h = "";
        for(let i=1; i<=32; i++) {
            if(DIAM_IDS.includes(i)) continue;
            let pr = toEven((150 * Math.pow(i, 2.8)) * game.adminPriceMult);
            let full = game.inv[i] >= game.capacity;
            h += `<div class="card"><img src="assets/slime${i}.png" style="width:38px" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'"><div style="flex:1"><b>Слайм №${i}</b><br><small>${fNum(pr)} <img src="assets/coin.png" class="res-img-s"></small></div><button class="btn" style="width:85px" onclick="buySlime(${i}, ${pr})" ${game.coins < pr || full ? 'disabled' : ''}>${full ? 'MAX' : 'КУПИТЬ'}</button></div>`;
        }
        document.getElementById('list-s').innerHTML = h;
    }

    function renderVipShop() {
        let vp = toEven(100 * game.adminPriceMult);
        let h = `<div class="card" style="border:1px solid #8e44ad;"><div style="flex:1"><b>VIP КАРТА</b></div><button class="btn" style="width:110px; background:#8e44ad; color:white;" onclick="buyVip(${vp})" ${game.diams < vp || game.isVip ? 'disabled' : ''}>${game.isVip ? 'OK' : fNum(vp)+' <img src="assets/diamond.png" class="res-img-s">'}</button></div>`;
        DIAM_IDS.forEach(i => {
            let pr = toEven((40 * Math.pow(i-15, 2.5)) * game.adminPriceMult);
            let full = game.inv[i] >= game.capacity;
            h += `<div class="card"><img src="assets/slime${i}.png" style="width:38px" onerror="this.src='https://cdn-icons-png.flaticon.com/512/825/825561.png'"><div style="flex:1"><b>Редкий №${i}</b><br><small>${fNum(pr)} <img src="assets/diamond.png" class="res-img-s"></small></div><button class="btn" style="width:85px; background:var(--diam)" onclick="buyDiamSlime(${i}, ${pr})" ${game.diams < pr || full ? 'disabled' : ''}>КУПИТЬ</button></div>`;
        });
        document.getElementById('list-v').innerHTML = h;
    }

    function renderUpgrades() {
        let cost = toEven(((game.rank + 1) * 120000 * (game.rank + 1)) * game.adminPriceMult);
        let max = game.rank >= RANKS.length - 1;
        document.getElementById('list-u').innerHTML = `<div class="card" style="flex-direction:column; text-align:center;"><b>${RANKS[game.rank].n} (x${fNum(RANKS[game.rank].m)})</b><button class="btn" style="margin-top:10px" onclick="upRank(${cost})" ${game.coins < cost || max ? 'disabled' : ''}>${max ? 'MAX' : fNum(cost)+' <img src="assets/coin.png" class="res-img-s">'}</button></div>`;
    }

    function renderQuests() {
        let h = "";
        for(let i=1; i<=8; i++) {
            let goal = toEven(i * 1500 * (game.rank + 1));
            let rew = toEven(i * 20 * (game.rank + 1));
            let done = game.clicks >= goal;
            if(done && !game.usedCodes.includes('Q'+game.rank+i)) { game.diams += rew; game.usedCodes.push('Q'+game.rank+i); }
            h += `<div class="card" style="opacity:${done?0.3:1}"><div style="flex:1"><b>Квест #${i}</b><br><small>${fNum(goal)} кликов</small></div><div style="color:var(--diam)">+${fNum(rew)} <img src="assets/diamond.png" class="res-img-s"></div></div>`;
        }
        document.getElementById('list-q').innerHTML = h;
    }

    function buySlime(id, p) { if(game.coins >= p && game.inv[id] < game.capacity) { game.coins -= p; game.inv[id]++; render(); } }
    function buyDiamSlime(id, p) { if(game.diams >= p && game.inv[id] < game.capacity) { game.diams -= p; game.inv[id]++; render(); } }
    function buyVip(p) { if(game.diams >= p) { game.diams -= p; game.isVip = true; render(); } }
    function upRank(c) { if(game.coins >= c && game.rank < RANKS.length-1) { game.coins -= c; game.rank++; render(); } }
    function vipClick() { if(!game.isVip) return; let t=0; game.inv.forEach((c,id)=>{if(c>0) t+=toEven(id*c*RANKS[game.rank].m);}); if(t>0){game.coins+=t; game.clicks++; render();} }

    function claimCode() {
        const c = document.getElementById('promo-code').value.toUpperCase();
        if(c === '12.02.2014') { openAdmin(); return; }
        if(game.usedCodes.includes(c)) return;
        const codes = {'START':{c:2000,d:0},'MARK42':{c:50000,d:500},'BOOSTER':{c:0,d:1000}};
        if(codes[c]) { game.coins += codes[c].c; game.diams += codes[c].d; game.usedCodes.push(c); render(); alert("OK"); }
    }

    function openAdmin() { closeSett(); document.getElementById('modal-admin').style.display='flex'; document.getElementById('adm-coins').value=game.coins; document.getElementById('adm-diams').value=game.diams; document.getElementById('adm-price').value=game.adminPriceMult; }
    function closeAdmin() { document.getElementById('modal-admin').style.display='none'; }
    function applyAdmin() { game.coins=parseInt(document.getElementById('adm-coins').value); game.diams=parseInt(document.getElementById('adm-diams').value); game.adminPriceMult=parseFloat(document.getElementById('adm-price').value); render(); closeAdmin(); }

    function applySett() {
        game.settings.music = document.getElementById('set-music').checked;
        game.settings.sfx = document.getElementById('set-sfx').checked;
        game.settings.hd = document.getElementById('set-hd').checked;
        document.body.className = game.settings.hd ? 'hd-on' : '';
        let m = document.getElementById('s-music');
        if(game.settings.music) m.play().catch(()=>{}); else m.pause();
    }

    function openSett() { document.getElementById('modal-settings').style.display = 'flex'; }
    function closeSett() { document.getElementById('modal-settings').style.display = 'none'; }
    function setPage(p) { game.page = p; render(); }
    function openTab(t) {
        ['s','v','u','q'].forEach(x => { document.getElementById('t-'+x).classList.remove('active'); document.getElementById('list-'+x).style.display='none'; });
        document.getElementById('t-'+t).classList.add('active'); document.getElementById('list-'+t).style.display='block';
    }

    init();
</script>
</body>
</html>
